
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Алгебра 9 класс — EPALLAXIS</title>

  <style>
    /* ===== ПЕРЕМЕННЫЕ ===== */
    :root {
      --bg: #060a10;
      --panel: #0f1720;
      --panel2: #111c26;
      --text: #e8f0ea;
      --muted: #9aa4b2;
      --accent: #22ff88;
      --accent-rgb: 34, 255, 136;
      --border: rgba(34, 255, 136, 0.18);
      --radius: 16px;
      --transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ===== СБРОС И БАЗА ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    }

    body {
      background: radial-gradient(1200px 600px at 20% 0%, #0d1f18 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      padding: 0 20px 40px;
      display: flex;
      flex-direction: column;
      transition: background 0.5s;
    }

    /* ===== HEADER ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6, 10, 16, 0.75);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 10px;
      margin: 0 -20px;
      padding-left: 20px;
      padding-right: 20px;
      display: flex;
      flex-direction: column;
      animation: fadeDown 0.7s var(--transition);
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand h1 {
      font-size: clamp(20px, 4vw, 28px);
      letter-spacing: 2px;
      line-height: 1.1;
    }
    .brand h1 span { color: var(--accent); }
    .brand p {
      font-size: clamp(11px, 1.5vw, 14px);
      color: var(--muted);
    }

    .progress-bar {
      width: 100%;
      height: 2px;
      background: var(--border);
      border-radius: 4px;
      margin-top: 10px;
      overflow: hidden;
    }
    .progress-bar .fill {
      width: 0%;
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      box-shadow: 0 0 12px var(--accent);
      transition: width 0.15s ease-out;
    }

    /* ===== ЗАГОЛОВОК ===== */
    .page-title {
      max-width: 900px;
      margin: 30px auto 10px;
      width: 100%;
      z-index: 2;
      position: relative;
      text-align: left;
    }
    .page-title h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .page-title h1 span { color: var(--accent); }
    .page-title p {
      color: var(--muted);
      font-size: clamp(14px, 1.5vw, 18px);
      margin-top: 6px;
    }

    /* ===== ROADMAP ===== */
    .roadmap {
      max-width: 900px;
      margin: 10px auto 40px;
      width: 100%;
      position: relative;
      z-index: 2;
      padding: 20px 0;
    }

    .roadmap-line {
      position: absolute;
      left: 40px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
      z-index: 0;
      transition: background 0.5s;
    }
    .roadmap-line .fill {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 0%;
      background: var(--accent);
      transition: height 0.25s ease-out;
      box-shadow: 0 0 12px var(--accent);
      will-change: height;
    }

    .roadmap-item {
      position: relative;
      padding-left: 80px;
      padding-bottom: 40px;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .roadmap-item.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .roadmap-item:last-child {
      padding-bottom: 0;
    }

    .roadmap-marker {
      position: absolute;
      left: 32px;
      top: 8px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--panel);
      border: 2px solid var(--border);
      z-index: 1;
      transition: border-color 0.4s, background 0.4s, box-shadow 0.4s, transform 0.3s;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .roadmap-item:hover .roadmap-marker {
      border-color: var(--accent);
      background: var(--accent);
      box-shadow: 0 0 20px rgba(var(--accent-rgb), 0.4);
      transform: translateX(-50%) scale(1.2);
    }
    .roadmap-item.active .roadmap-marker {
      border-color: var(--accent);
      background: var(--accent);
      box-shadow: 0 0 30px rgba(var(--accent-rgb), 0.5);
    }

    .roadmap-card {
      background: linear-gradient(145deg, var(--panel), var(--panel2));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 24px;
      cursor: pointer;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s, background 0.3s;
      position: relative;
      overflow: hidden;
      will-change: transform;
    }
    .roadmap-card:hover {
      transform: translateX(8px) scale(1.01);
      border-color: var(--accent);
      box-shadow: 0 8px 30px rgba(var(--accent-rgb), 0.10);
    }
    .roadmap-card:active {
      transform: scale(0.98);
      transition-duration: 0.08s;
    }
    .roadmap-card.active {
      border-color: var(--accent);
      background: rgba(34, 255, 136, 0.04);
      box-shadow: 0 8px 30px rgba(var(--accent-rgb), 0.12);
    }

    .roadmap-card .card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .roadmap-card .card-number {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      min-width: 50px;
      letter-spacing: 1px;
    }
    .roadmap-card .card-title {
      font-size: clamp(20px, 2.5vw, 26px);
      font-weight: 600;
      flex: 1;
    }
    .roadmap-card .card-icon {
      font-size: 28px;
      color: rgba(34, 255, 136, 0.3);
      transition: color 0.3s;
    }
    .roadmap-card:hover .card-icon {
      color: var(--accent);
    }

    .roadmap-card .card-details {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      color: var(--muted);
      font-size: 14px;
    }
    .roadmap-card .card-details .sections {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .roadmap-card .card-details .sections span {
      background: rgba(34, 255, 136, 0.06);
      padding: 2px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .roadmap-card .card-details .badge {
      background: rgba(34, 255, 136, 0.08);
      color: var(--accent);
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid rgba(34, 255, 136, 0.15);
      transition: opacity 0.3s;
    }
    .roadmap-card .card-details .badge.loading {
      opacity: 0.5;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .roadmap-card .card-arrow {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      opacity: 0.2;
      font-size: 24px;
      transition: opacity 0.3s, transform 0.3s;
    }
    .roadmap-card:hover .card-arrow {
      opacity: 0.8;
      transform: translateY(-50%) translateX(6px);
    }

    .roadmap-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 200%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03) 50%, transparent);
      transform: skewX(-25deg);
      transition: left 0.6s;
      pointer-events: none;
    }
    .roadmap-card:hover::before {
      left: 100%;
    }

    /* ===== МАТЕРИАЛЫ ===== */
    .materials-section {
      max-width: 900px;
      margin: 0 auto 30px;
      width: 100%;
      position: relative;
      z-index: 2;
    }
    .materials-section h2 {
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: -0.3px;
    }
    .materials-section h2 span { color: var(--accent); }

    .materials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .material-card {
      background: linear-gradient(145deg, var(--panel), var(--panel2));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      opacity: 0;
      animation: fadeUp 0.5s var(--transition) forwards;
      will-change: transform, opacity;
    }
    .material-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 30px rgba(var(--accent-rgb), 0.10);
    }
    .material-card .icon { font-size: 24px; flex-shrink: 0; color: var(--accent); }
    .material-card .info { flex: 1; }
    .material-card .info .name { font-size: 15px; font-weight: 500; line-height: 1.2; }
    .material-card .info .badge { font-size: 11px; color: var(--muted); opacity: 0.6; display: block; margin-top: 2px; }
    .material-card .arrow { color: var(--accent); opacity: 0.4; transition: transform 0.3s, opacity 0.3s; }
    .material-card:hover .arrow { transform: translateX(4px); opacity: 1; }

    .msg {
      color: var(--muted);
      font-size: 16px;
      padding: 20px 0;
      text-align: center;
      opacity: 0.7;
    }
    .msg.error { color: #ff6b6b; opacity: 1; }
    .msg.empty { opacity: 0.5; font-style: italic; }

    .reload-btn {
      margin-top: 16px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }
    .reload-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ===== КНОПКА НАЗАД ===== */
    .back-link {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 1000;
      padding: 10px 22px;
      border: 1px solid var(--border);
      border-radius: 40px;
      background: rgba(6, 10, 16, 0.7);
      backdrop-filter: blur(12px);
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: border-color 0.5s, color 0.5s, background 0.5s, box-shadow 0.5s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      will-change: transform;
    }
    .back-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(34, 255, 136, 0.08);
      box-shadow: 0 6px 30px rgba(34, 255, 136, 0.15);
    }

    /* ===== АНИМАЦИИ ===== */
    @keyframes fadeDown {
      0% { opacity: 0; transform: translateY(-30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ===== АДАПТИВНОСТЬ ===== */
    @media (max-width: 768px) {
      .roadmap { padding-left: 0; }
      .roadmap-line { left: 20px; }
      .roadmap-item { padding-left: 50px; padding-bottom: 30px; }
      .roadmap-marker { left: 14px; width: 14px; height: 14px; top: 6px; }
      .roadmap-card { padding: 14px 16px; }
      .roadmap-card .card-number { font-size: 22px; min-width: 36px; }
      .roadmap-card .card-title { font-size: 18px; }
      .roadmap-card .card-icon { font-size: 22px; }
      .roadmap-card .card-details .sections span { font-size: 11px; padding: 1px 8px; }
      .roadmap-card .card-arrow { display: none; }
      header { backdrop-filter: none !important; background: rgba(6, 10, 16, 0.92); }
      .back-link { bottom: 16px; left: 16px; padding: 8px 18px; font-size: 13px; }
    }

    @media (max-width: 480px) {
      body { padding: 0 12px 30px; }
      header { margin: 0 -12px; padding-left: 12px; padding-right: 12px; }
      .roadmap-item { padding-left: 40px; padding-bottom: 24px; }
      .roadmap-line { left: 12px; }
      .roadmap-marker { left: 6px; width: 12px; height: 12px; top: 4px; }
      .roadmap-card { padding: 12px 14px; }
      .roadmap-card .card-number { font-size: 18px; min-width: 28px; }
      .roadmap-card .card-title { font-size: 16px; }
      .roadmap-card .card-icon { font-size: 18px; }
      .roadmap-card .card-details { font-size: 12px; flex-direction: column; gap: 4px; margin-top: 6px; }
      .materials-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="header-row">
      <div class="brand">
        <h1>EPALLAXIS <span>math</span></h1>
        <p>Ἐπαλλάσσω — приводить систему в порядок</p>
      </div>
    </div>
    <div class="progress-bar" id="progressBar">
      <div class="fill" id="progressFill"></div>
    </div>
  </header>

  <!-- ЗАГОЛОВОК -->
  <div class="page-title">
    <h1>Алгебра <span>9 класс</span></h1>
    <p>Изучайте главы последовательно или выбирайте любую</p>
  </div>

  <!-- ROADMAP -->
  <div class="roadmap" id="roadmapContainer">
    <div class="roadmap-line" id="roadmapLine">
      <div class="fill" id="lineFill"></div>
    </div>
    <div id="roadmapItems"></div>
  </div>

  <!-- МАТЕРИАЛЫ -->
  <section class="materials-section" id="materialsSection" style="display:none;">
    <h2>Материалы к <span>главе I</span></h2>
    <div class="materials-grid" id="materialsGrid">
      <div class="msg">⏳ Загрузка материалов...</div>
    </div>
    <button class="reload-btn" id="reloadBtn">🔄 Обновить материалы</button>
  </section>

  <!-- КНОПКА НАЗАД -->
  <a href="../../index.html" class="back-link" id="backLink">← На главную</a>

  <script>
    // ================================================================
    // 1. ДАННЫЕ ГЛАВ
    // ================================================================
    const chapters = [{
      id: 1,
      roman: 'I',
      title: 'Рациональные выражения',
      icon: '∫',
      sheetUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT26wJo6YqIuMWa8GtnOyhAItVGXClBA4-K-1aLtndE2RfO9Obl0KqMwdVFTmGXT4nTzg4d-fLePjxm/pubhtml',
      sections: ['Рациональная дробь', 'Основное свойство', 'Сложение и вычитание', 'Умножение и деление', 'Преобразования']
    }, {
      id: 2,
      roman: 'II',
      title: 'Функции',
      icon: 'f(x)',
      sheetUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS3MyhOtLcoAX9Vk8wwvctJ0kqs07kMMuft7F47QMizhrs9aoN7yf_mwTQbGCyQml8IBGgNQHwUeYve/pubhtml',
      sections: ['Область определения', 'Свойства функции', 'Чётные и нечётные', 'Построение графиков']
    }, {
      id: 3,
      roman: 'III',
      title: 'Дробно-рациональные уравнения',
      icon: '≈',
      sheetUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMEQnDidXTjG8LiSe42NkCG--a1WClr2NpWDfSponjpbMqVo4rwdau1warnSntHbnErSLvV5eVUEeN/pubhtml',
      sections: ['Уравнения', 'Системы', 'Уравнение окружности', 'Неравенства']
    }, {
      id: 4,
      roman: 'IV',
      title: 'Прогрессии',
      icon: '∑',
      sheetUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRnMZ4PUuRh5CYwgnZuYe4BECJU4hTlZ4EO9ttMbiP2NWzozCWvZAg2kKexDuvFejj6NBpaIbYew57/pubhtml',
      sections: ['Последовательность', 'Арифметическая', 'Сумма арифметической', 'Геометрическая', 'Сумма геометрической', 'Бесконечно убывающая']
    }];

    // ================================================================
    // 2. ПОСТРОЕНИЕ ROADMAP
    // ================================================================
    const container = document.getElementById('roadmapItems');
    const lineFill = document.getElementById('lineFill');

    function buildRoadmap() {
      container.innerHTML = '';
      chapters.forEach((ch, idx) => {
        const item = document.createElement('div');
        item.className = 'roadmap-item';
        item.dataset.chapter = ch.id;
        item.style.transitionDelay = `${idx * 0.08}s`;

        const sectionsPreview = ch.sections.slice(0, 3).map(s => `<span>${s}</span>`).join('');
        const more = ch.sections.length > 3 ? `<span>+${ch.sections.length - 3}</span>` : '';

        item.innerHTML = `
          <div class="roadmap-marker"></div>
          <div class="roadmap-card" data-chapter="${ch.id}">
            <div class="card-header">
              <div class="card-number">${ch.roman}</div>
              <div class="card-title">${ch.title}</div>
              <div class="card-icon">${ch.icon}</div>
            </div>
            <div class="card-details">
              <div class="sections">${sectionsPreview} ${more}</div>
              <span class="badge loading" id="badge-${ch.id}">⏳ загрузка...</span>
            </div>
            <div class="card-arrow">→</div>
          </div>
        `;

        const card = item.querySelector('.roadmap-card');
        card.addEventListener('click', () => showChapter(ch.id));

        // Наведение для маркера
        card.addEventListener('mouseenter', () => {
          const marker = item.querySelector('.roadmap-marker');
          marker.style.borderColor = 'var(--accent)';
          marker.style.background = 'var(--accent)';
          marker.style.boxShadow = '0 0 20px rgba(34,255,136,0.4)';
          marker.style.transform = 'translateX(-50%) scale(1.2)';
        });
        card.addEventListener('mouseleave', () => {
          const marker = item.querySelector('.roadmap-marker');
          if (!item.classList.contains('active')) {
            marker.style.borderColor = 'var(--border)';
            marker.style.background = 'var(--panel)';
            marker.style.boxShadow = 'none';
            marker.style.transform = 'translateX(-50%) scale(1)';
          }
        });

        container.appendChild(item);
      });

      // Observer для появления
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add('visible');
        });
        updateLineProgress();
      }, { threshold: 0.15 });

      document.querySelectorAll('.roadmap-item').forEach(el => observer.observe(el));
      window.addEventListener('scroll', updateLineProgress, { passive: true });
      window.addEventListener('resize', updateLineProgress, { passive: true });
      requestAnimationFrame(updateLineProgress);
    }

    // ================================================================
    // 3. ПРОГРЕСС ЛИНИИ (МОНОТОННЫЙ)
    // ================================================================
    let progressAnimId = null;
    let lastProgress = 0;

    function updateLineProgress() {
      if (progressAnimId) cancelAnimationFrame(progressAnimId);
      progressAnimId = requestAnimationFrame(() => {
        const items = document.querySelectorAll('.roadmap-item');
        if (!items.length) return;

        const viewportTop = window.scrollY;
        let passed = 0;

        items.forEach(item => {
          const rect = item.getBoundingClientRect();
          const itemTop = rect.top + window.scrollY;
          // Считаем карточку пройденной, если её верхняя граница выше окна + небольшой буфер
          if (itemTop < viewportTop + 30) {
            passed++;
          }
        });

        // Прогресс не может уменьшаться — монотонно растёт
        const rawProgress = Math.min(100, (passed / items.length) * 100);
        const progress = Math.max(lastProgress, rawProgress);
        lastProgress = progress;

        lineFill.style.height = progress + '%';
        progressAnimId = null;
      });
    }

    // ================================================================
    // 4. ЗАГРУЗКА КОЛИЧЕСТВА ТЕМ (первоначальная, кешируем)
    // ================================================================
    const topicCountCache = new Map();

    async function fetchTopicCount(chapterId) {
      const ch = chapters.find(c => c.id === chapterId);
      if (!ch) return 0;
      try {
        const url = ch.sheetUrl.replace('/pubhtml', '/pub?output=csv');
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const csv = await resp.text();
        const lines = csv.split('\n').filter(l => l.trim() !== '');
        if (lines.length < 2) return 0;
        const dataLines = lines.slice(1).filter(l => l.includes(','));
        return dataLines.length;
      } catch (e) {
        console.warn(`Ошибка загрузки количества для главы ${chapterId}:`, e);
        return 0;
      }
    }

    async function loadAllTopicCounts() {
      const promises = chapters.map(async ch => {
        const count = await fetchTopicCount(ch.id);
        topicCountCache.set(ch.id, count);
        const badge = document.getElementById(`badge-${ch.id}`);
        if (badge) {
          badge.textContent = `${count} тем`;
          badge.classList.remove('loading');
        }
        return count;
      });
      await Promise.all(promises);
    }

    // ================================================================
    // 5. ПОКАЗ МАТЕРИАЛОВ (ВСЕГДА СВЕЖИЙ ЗАПРОС)
    // ================================================================
    let currentChapter = null;
    let abortController = null;

    async function showChapter(id) {
      const ch = chapters.find(c => c.id === id);
      if (!ch) return;

      const section = document.getElementById('materialsSection');
      const h2 = section.querySelector('h2 span');
      h2.textContent = `главе ${ch.roman}`;
      section.style.display = 'block';
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });

      // Активная подсветка
      document.querySelectorAll('.roadmap-item').forEach(el => {
        el.classList.remove('active');
        const marker = el.querySelector('.roadmap-marker');
        marker.style.borderColor = 'var(--border)';
        marker.style.background = 'var(--panel)';
        marker.style.boxShadow = 'none';
        marker.style.transform = 'translateX(-50%) scale(1)';
      });
      const activeItem = document.querySelector(`.roadmap-item[data-chapter="${ch.id}"]`);
      if (activeItem) {
        activeItem.classList.add('active');
        const marker = activeItem.querySelector('.roadmap-marker');
        marker.style.borderColor = 'var(--accent)';
        marker.style.background = 'var(--accent)';
        marker.style.boxShadow = '0 0 30px rgba(34,255,136,0.5)';
        marker.style.transform = 'translateX(-50%) scale(1.2)';
      }

      currentChapter = ch;
      await loadMaterials(ch, true);
    }

    // ================================================================
    // 6. ЗАГРУЗКА МАТЕРИАЛОВ (всегда fetch, без кеша)
    // ================================================================
    async function loadMaterials(chapter, forceRefresh = false) {
      const grid = document.getElementById('materialsGrid');
      grid.innerHTML = `<div class="msg">⏳ Загрузка материалов...</div>`;

      if (abortController) abortController.abort();
      abortController = new AbortController();

      try {
        const url = chapter.sheetUrl.replace('/pubhtml', '/pub?output=csv');
        const resp = await fetch(url, { signal: abortController.signal });
        if (!resp.ok) throw new Error(`HTTP ${resp.status} – ${resp.statusText}`);
        const csvText = await resp.text();

        const lines = csvText.split('\n').filter(l => l.trim() !== '');
        if (lines.length < 2) throw new Error('Таблица пуста или содержит только заголовок');

        const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
        const nameIdx = headers.findIndex(h => h.toLowerCase() === 'название карточки параграфа');
        const linkIdx = headers.findIndex(h => h.toLowerCase() === 'ссылка');
        if (nameIdx === -1 || linkIdx === -1) {
          throw new Error('Не найдены колонки "Название карточки параграфа" и "Ссылка"');
        }

        const items = [];
        for (let i = 1; i < lines.length; i++) {
          const vals = lines[i].split(',').map(v => v.trim().replace(/^"|"$/g, ''));
          if (vals.length <= Math.max(nameIdx, linkIdx)) continue;
          const name = vals[nameIdx] || '';
          const link = vals[linkIdx] || '';
          if (name && link) items.push({ name, link });
        }

        if (!items.length) throw new Error('Нет строк с заполненными данными');

        renderMaterials(items);

        // Обновляем количество тем в бейдже (актуальное)
        const count = items.length;
        topicCountCache.set(chapter.id, count);
        const badge = document.getElementById(`badge-${chapter.id}`);
        if (badge) {
          badge.textContent = `${count} тем`;
          badge.classList.remove('loading');
        }

      } catch (err) {
        if (err.name === 'AbortError') return;
        console.error('Ошибка загрузки материалов:', err);
        grid.innerHTML = `<div class="msg error">⚠️ Ошибка: ${err.message || 'неизвестная'}</div>`;
      }
    }

    function renderMaterials(items) {
      const grid = document.getElementById('materialsGrid');
      grid.innerHTML = '';
      items.forEach((item, idx) => {
        const card = document.createElement('a');
        card.className = 'material-card';
        card.href = item.link;
        card.target = '_blank';
        card.style.animationDelay = `${0.1 + idx * 0.05}s`;

        let icon = '📄';
        const lower = item.name.toLowerCase();
        if (lower.includes('теория')) icon = '📘';
        else if (lower.includes('практика')) icon = '✏️';
        else if (lower.includes('тест')) icon = '📝';
        else if (lower.includes('видео')) icon = '🎥';

        card.innerHTML = `
          <span class="icon">${icon}</span>
          <div class="info">
            <div class="name">${item.name}</div>
            <span class="badge">📎 Материал</span>
          </div>
          <span class="arrow">→</span>
        `;
        grid.appendChild(card);
      });
    }

    // ================================================================
    // 7. ОБНОВЛЕНИЕ МАТЕРИАЛОВ ПО КНОПКЕ
    // ================================================================
    document.getElementById('reloadBtn').addEventListener('click', () => {
      if (currentChapter) {
        loadMaterials(currentChapter, true);
      }
    });

    // ================================================================
    // 8. ПРОГРЕСС-БАР В ХЕДЕРЕ
    // ================================================================
    (function initProgress() {
      const fill = document.getElementById('progressFill');
      let ticking = false;
      const update = () => {
        if (!ticking) {
          requestAnimationFrame(() => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
            fill.style.width = Math.min(100, progress) + '%';
            ticking = false;
          });
          ticking = true;
        }
      };
      window.addEventListener('scroll', update, { passive: true });
      window.addEventListener('resize', update, { passive: true });
      update();
    })();

    // ================================================================
    // 9. ФИЗИКА КНОПКИ НАЗАД
    // ================================================================
    (function initBackLink() {
      const link = document.getElementById('backLink');
      let lastScroll = window.scrollY;
      let target = 0, current = 0, velocity = 0;
      const SPRING = 0.12, DAMPING = 0.88, MAX = 35, SENS = 0.06;
      let animId = null;

      const update = () => {
        const force = (target - current) * SPRING;
        velocity += force;
        velocity *= DAMPING;
        current += velocity;
        if (Math.abs(current) > MAX) { current = Math.sign(current) * MAX; velocity *= 0.5; }
        link.style.setProperty('--pull', current);
        link.classList.toggle('pull', Math.abs(current) > 0.5);

        if (Math.abs(velocity) > 0.01 || Math.abs(current - target) > 0.1) {
          animId = requestAnimationFrame(update);
        } else {
          current = target;
          link.style.setProperty('--pull', current);
          link.classList.toggle('pull', Math.abs(current) > 0.5);
          animId = null;
        }
      };

      let timeout = null;
      window.addEventListener('scroll', () => {
        const scrollY = window.scrollY;
        const delta = scrollY - lastScroll;
        target = Math.max(-MAX, Math.min(MAX, target - delta * SENS));
        lastScroll = scrollY;
        if (!animId) animId = requestAnimationFrame(update);
        clearTimeout(timeout);
        timeout = setTimeout(() => { target = 0; if (!animId) animId = requestAnimationFrame(update); }, 250);
      }, { passive: true });
    })();

    // ================================================================
    // 10. ИНИЦИАЛИЗАЦИЯ
    // ================================================================
    buildRoadmap();
    loadAllTopicCounts();

    // (опционально) автозагрузка первой главы
    // if (chapters.length) showChapter(chapters[0].id);
  </script>

</body>
