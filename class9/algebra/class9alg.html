<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Алгебра 9 класс — EPALLAXIS</title>

  <style>
    /* ===== Алгебра — зелёная тема ===== */
    :root {
      --bg: #060a10;
      --panel: #0f1720;
      --panel2: #111c26;
      --text: #e8f0ea;
      --muted: #9aa4b2;
      --accent: #22ff88;
      --accent-rgb: 34, 255, 136;
      --border: rgba(34, 255, 136, 0.18);
    }

    * {
      transition: background 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                  border-color 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                  color 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    }

    body {
      background: radial-gradient(1200px 600px at 20% 0%, #0d1f18 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 20px 40px;
      transition: background 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
    }

    /* ===== Фоновые символы ===== */
    .bg-symbols {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-symbols span {
      position: absolute;
      color: rgba(34, 255, 136, 0.04);
      font-size: 80px;
      font-weight: 700;
      font-family: 'Georgia', serif;
      user-select: none;
      animation: breathe 8s ease-in-out infinite;
      opacity: 0.3;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.02; transform: scale(1); }
      50% { opacity: 0.08; transform: scale(1.05); }
    }

    /* ===== HEADER ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6, 10, 16, 0.75);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 10px;
      display: flex;
      flex-direction: column;
      transition: background 0.5s, border-color 0.5s;
      margin: 0 -20px 0;
      padding-left: 20px;
      padding-right: 20px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand h1 {
      font-size: clamp(20px, 4vw, 28px);
      letter-spacing: 2px;
      line-height: 1.1;
    }

    .brand h1 span {
      color: var(--accent);
    }

    .brand p {
      font-size: clamp(11px, 1.5vw, 14px);
      color: var(--muted);
      margin-top: 2px;
    }

    .progress-bar {
      width: 100%;
      height: 2px;
      background: var(--border);
      border-radius: 4px;
      margin-top: 10px;
      overflow: hidden;
      transition: background 0.5s;
    }
    .progress-bar .fill {
      width: 0%;
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.15s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 0 12px var(--accent);
    }

    /* ===== ЗАГОЛОВОК ===== */
    .page-title {
      max-width: 1100px;
      margin: 30px auto 10px;
      width: 100%;
      text-align: left;
      position: relative;
      z-index: 2;
    }

    .page-title h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .page-title h1 span {
      color: var(--accent);
    }

    .page-title p {
      color: var(--muted);
      font-size: clamp(14px, 1.5vw, 18px);
      margin-top: 6px;
    }

    /* ===== КАРТОЧКИ ГЛАВ ===== */
    .topics-grid {
      max-width: 1100px;
      margin: 10px auto 0;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .topic-card {
      background: linear-gradient(145deg, var(--panel), var(--panel2));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px 20px 18px;
      cursor: pointer;
      transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), background 0.5s, border-color 0.5s, box-shadow 0.5s;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: cardReveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .topic-card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: var(--accent);
      box-shadow: 0 8px 40px rgba(var(--accent-rgb), 0.15),
                  0 0 60px rgba(var(--accent-rgb), 0.05);
    }

    .topic-card:active {
      transform: scale(0.97);
      transition: transform 0.08s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .topic-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 200%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04) 50%, transparent);
      transform: skewX(-25deg);
      transition: left 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }
    .topic-card:hover::before,
    .topic-card:active::before {
      left: 100%;
    }

    @keyframes cardReveal {
      0% { opacity: 0; transform: translateY(20px) scale(0.95) rotate(-2deg); }
      100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    }

    .topic-number {
      display: flex;
      align-items: baseline;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 2px;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .topic-number .chapter-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .topic-number .chapter-number {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .topic-number .chapter-number::after {
      content: ".";
      font-weight: 400;
      opacity: 0.6;
    }

    .topic-number::after {
      content: "";
      display: block;
      width: 30px;
      height: 2px;
      background: var(--accent);
      margin-top: 4px;
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 0 12px var(--accent);
      flex-basis: 100%;
    }

    .topic-card:hover .topic-number::after,
    .topic-card:active .topic-number::after {
      width: 60px;
    }

    .topic-card:hover .topic-number .chapter-label,
    .topic-card:hover .topic-number .chapter-number,
    .topic-card:active .topic-number .chapter-label,
    .topic-card:active .topic-number .chapter-number {
      text-shadow: 0 0 30px var(--accent);
    }

    .topic-title {
      font-size: clamp(20px, 2.2vw, 28px);
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .topic-description {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    .topic-description .section {
      display: block;
      margin-top: 2px;
      font-size: 13px;
      color: var(--muted);
      opacity: 0.7;
    }

    .topic-arrow {
      margin-top: 14px;
      align-self: flex-end;
      color: var(--accent);
      font-size: 18px;
      font-weight: 500;
      opacity: 0.6;
      transition: transform 0.3s, opacity 0.3s;
    }

    .topic-card:hover .topic-arrow {
      transform: translateX(6px);
      opacity: 1;
    }

    /* ===== МАТЕРИАЛЫ ===== */
    .materials-section {
      max-width: 1100px;
      margin: 40px auto 10px;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .materials-section h2 {
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: -0.3px;
    }

    .materials-section h2 span {
      color: var(--accent);
    }

    .materials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .material-card {
      background: linear-gradient(145deg, var(--panel), var(--panel2));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), background 0.5s, border-color 0.5s, box-shadow 0.5s;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      animation: cardReveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .material-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 30px rgba(var(--accent-rgb), 0.10);
    }

    .material-card .icon {
      font-size: 24px;
      flex-shrink: 0;
      color: var(--accent);
    }

    .material-card .info {
      flex: 1;
    }

    .material-card .info .name {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.2;
    }

    .material-card .info .badge {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      opacity: 0.6;
      display: inline-block;
    }

    .material-card .arrow {
      color: var(--accent);
      opacity: 0.4;
      transition: transform 0.3s, opacity 0.3s;
    }

    .material-card:hover .arrow {
      transform: translateX(4px);
      opacity: 1;
    }

    .loading-msg, .error-msg, .empty-msg {
      color: var(--muted);
      font-size: 16px;
      padding: 20px 0;
      text-align: center;
      opacity: 0.7;
    }
    .error-msg { color: #ff6b6b; opacity: 1; }
    .empty-msg { opacity: 0.5; font-style: italic; }

    /* ===== КНОПКА НАЗАД ===== */
    .back-link {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 1000;
      padding: 10px 22px;
      border: 1px solid var(--border);
      border-radius: 40px;
      background: rgba(6, 10, 16, 0.7);
      backdrop-filter: blur(12px);
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: border-color 0.5s, color 0.5s, background 0.5s, box-shadow 0.5s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      letter-spacing: 0.3px;
      will-change: transform;
    }

    .back-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(34, 255, 136, 0.08);
      box-shadow: 0 6px 30px rgba(34, 255, 136, 0.15);
    }

    /* ===== АДАПТИВ ===== */
    @media (max-width: 640px) {
      body { padding: 0 16px 30px; }
      header { margin: 0 -16px; padding-left: 16px; padding-right: 16px; }
      .brand p { font-size: 11px; }
      .page-title { margin-top: 20px; }
      .progress-bar { margin-top: 6px; height: 2px; }
      .topics-grid { grid-template-columns: 1fr; gap: 16px; }
      .topic-card { padding: 18px; }
      .topic-title { font-size: 22px; }
      .materials-grid { grid-template-columns: 1fr; }
      .back-link {
        bottom: 16px;
        left: 16px;
        padding: 8px 18px;
        font-size: 13px;
      }
      .topic-card::before { display: none; }
      .topic-number .chapter-label { font-size: 12px; }
      .topic-number .chapter-number { font-size: 17px; }
      .topic-number::after { width: 24px; }
      .topic-card:hover .topic-number::after,
      .topic-card:active .topic-number::after { width: 40px; }
    }

    @media (max-width: 400px) {
      .topic-card { padding: 16px; }
      .topic-title { font-size: 20px; }
      .back-link {
        bottom: 12px;
        left: 12px;
        padding: 6px 14px;
        font-size: 12px;
      }
      .topic-number .chapter-number { font-size: 15px; }
      .topic-number .chapter-label { font-size: 11px; }
    }

    @media (min-width: 641px) {
      .topic-card::before { display: block; }
    }
  </style>
</head>

<body>

  <!-- Фоновые символы -->
  <div class="bg-symbols" id="bgSymbols"></div>

  <!-- HEADER -->
  <header>
    <div class="header-row">
      <div class="brand">
        <h1>EPALLAXIS <span>math</span></h1>
        <p>Ἐπαλλάσσω — приводить систему в порядок</p>
      </div>
    </div>
    <div class="progress-bar" id="progressBar">
      <div class="fill" id="progressFill"></div>
    </div>
  </header>

  <!-- ЗАГОЛОВОК -->
  <div class="page-title">
    <h1>Алгебра <span>9 класс</span></h1>
    <p>Выберите главу, чтобы начать изучение</p>
  </div>

  <!-- СЕТКА ГЛАВ -->
  <section class="topics-grid" id="topicsGrid"></section>

  <!-- ============================================================
       БЛОК "МАТЕРИАЛЫ К ГЛАВЕ"
  ============================================================ -->
  <section class="materials-section" id="materialsSection" style="display:none;">
    <h2>Материалы к <span>главе I</span></h2>
    <div class="materials-grid" id="materialsGrid">
      <div class="loading-msg">⏳ Загрузка материалов...</div>
    </div>
    <!-- Кнопка для принудительного обновления -->
    <button onclick="forceReload()" style="margin-top:16px; background:transparent; border:1px solid var(--border); color:var(--muted); padding:8px 20px; border-radius:30px; cursor:pointer; font-size:14px; transition:0.3s;">
      🔄 Обновить материалы
    </button>
  </section>

  <!-- КНОПКА НАЗАД -->
  <a href="../../index.html" class="back-link" id="backLink">← На главную</a>

  <script>
    // ================================================================
    // 1. ДАННЫЕ ГЛАВ (арабские номера для ссылок, римские для отображения)
    // ================================================================
    const chapters = [
      {
        id: 1,
        roman: 'I',
        title: 'Рациональные выражения',
        sheetUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT26wJo6YqIuMWa8GtnOyhAItVGXClBA4-K-1aLtndE2RfO9Obl0KqMwdVFTmGXT4nTzg4d-fLePjxm/pubhtml',
        sections: [
          'Рациональная дробь',
          'Основное свойство рациональной дроби. Сокращение',
          'Сложение и вычитание рациональных дробей',
          'Умножение и деление рациональных дробей',
          'Преобразования рациональных выражений'
        ]
      },
      {
        id: 2,
        roman: 'II',
        title: 'Функции',
        sheetUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS3MyhOtLcoAX9Vk8wwvctJ0kqs07kMMuft7F47QMizhrs9aoN7yf_mwTQbGCyQml8IBGgNQHwUeYve/pubhtml',
        sections: [
          'Функция числового аргумента. Область определения, множество значений',
          'Свойства функции',
          'Чётные и нечётные функции',
          'Построение графиков y = f(x) ± b, y = f(x ± a)'
        ]
      },
      {
        id: 3,
        roman: 'III',
        title: 'Дробно-рациональные уравнения и неравенства',
        sheetUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMEQnDidXTjG8LiSe42NkCG--a1WClr2NpWDfSponjpbMqVo4rwdau1warnSntHbnErSLvV5eVUEeN/pubhtml',
        sections: [
          'Дробно-рациональные уравнения',
          'Системы нелинейных уравнений',
          'Формула длины отрезка. Уравнение окружности',
          'Дробно-рациональные неравенства. Метод интервалов'
        ]
      },
      {
        id: 4,
        roman: 'IV',
        title: 'Прогрессии',
        sheetUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRnMZ4PUuRh5CYwgnZuYe4BECJU4hTlZ4EO9ttMbiP2NWzozCWvZAg2kKexDuvFejj6NBpaIbYew57/pubhtml',
        sections: [
          'Числовая последовательность',
          'Арифметическая прогрессия',
          'Формула суммы n первых членов арифметической прогрессии',
          'Геометрическая прогрессия',
          'Формула суммы n первых членов геометрической прогрессии',
          'Сумма бесконечно убывающей геометрической прогрессии'
        ]
      }
    ];

    // ================================================================
    // 2. ГЕНЕРАЦИЯ КАРТОЧЕК ГЛАВ
    // ================================================================
    const grid = document.getElementById('topicsGrid');

    chapters.forEach((chapter, index) => {
      const card = document.createElement('div');
      card.className = 'topic-card';
      card.style.animationDelay = `${0.1 + index * 0.1}s`;

      let sectionsHtml = '';
      chapter.sections.forEach(sec => {
        sectionsHtml += `<span class="section">§ ${sec}</span>`;
      });

      card.innerHTML = `
        <div class="topic-number">
          <span class="chapter-label">Глава</span>
          <span class="chapter-number">${chapter.roman}</span>
        </div>
        <div class="topic-title">${chapter.title}</div>
        <div class="topic-description">
          ${sectionsHtml}
        </div>
        <div class="topic-arrow">→</div>
      `;

      card.addEventListener('click', () => {
        showMaterialsForChapter(chapter.id, chapter.roman, chapter.title);
      });

      grid.appendChild(card);
    });

    // ================================================================
    // 3. ПОКАЗ МАТЕРИАЛОВ ДЛЯ ГЛАВЫ
    // ================================================================
    let currentChapterId = null;

    async function showMaterialsForChapter(chapterId, romanNumeral, chapterTitle) {
      const section = document.getElementById('materialsSection');
      const h2 = section.querySelector('h2 span');
      if (h2) h2.textContent = `главе ${romanNumeral}`;

      section.style.display = 'block';
      section.scrollIntoView({ behavior: 'smooth' });

      currentChapterId = chapterId;

      const chapterData = chapters.find(ch => ch.id === chapterId);
      if (!chapterData) {
        document.getElementById('materialsGrid').innerHTML = `<div class="error-msg">⚠️ Ошибка: глава не найдена.</div>`;
        return;
      }

      await loadMaterialsForChapter(chapterData);
    }

    // ================================================================
    // 4. ЗАГРУЗКА CSV ИЗ КОНКРЕТНОЙ ТАБЛИЦЫ
    // ================================================================
    async function loadMaterialsForChapter(chapterData) {
      const grid = document.getElementById('materialsGrid');
      grid.innerHTML = `<div class="loading-msg">⏳ Загрузка материалов...</div>`;

      try {
        const csvUrl = chapterData.sheetUrl.replace('/pubhtml', '/pub?output=csv');
        console.log(`📥 Загрузка CSV для главы ${chapterData.id} (${chapterData.roman}):`, csvUrl);

        const response = await fetch(csvUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);

        const csvText = await response.text();
        console.log(`✅ CSV для главы ${chapterData.id} получен, длина:`, csvText.length);

        const lines = csvText.split('\n').filter(line => line.trim() !== '');
        if (lines.length < 2) {
          grid.innerHTML = `<div class="empty-msg">📭 В таблице нет данных. Добавьте материалы.</div>`;
          return;
        }

        // Парсим заголовки
        const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
        console.log(`📋 Заголовки колонок для главы ${chapterData.id}:`, headers);

        // Находим индексы нужных колонок (по вашим названиям)
        const orderIdx = headers.findIndex(h => h.toLowerCase() === 'порядок');
        const nameIdx = headers.findIndex(h => h.toLowerCase() === 'название карточки параграфа');
        const linkIdx = headers.findIndex(h => h.toLowerCase() === 'ссылка');

        if (nameIdx === -1 || linkIdx === -1) {
          grid.innerHTML = `<div class="error-msg">⚠️ В таблице не найдены колонки "Название карточки параграфа" и "Ссылка". Проверьте заголовки.</div>`;
          return;
        }

        const items = [];
        for (let i = 1; i < lines.length; i++) {
          const values = lines[i].split(',').map(v => v.trim().replace(/^"|"$/g, ''));
          if (values.length <= Math.max(nameIdx, linkIdx)) continue;
          const name = values[nameIdx] || '';
          const link = values[linkIdx] || '';
          const order = parseInt(values[orderIdx]) || i;
          if (name && link) {
            items.push({ order, name, link });
          }
        }

        if (items.length === 0) {
          grid.innerHTML = `<div class="empty-msg">📭 Нет строк с заполненными названием и ссылкой.</div>`;
          return;
        }

        items.sort((a, b) => a.order - b.order);
        console.log(`📦 Для главы ${chapterData.id} получено элементов:`, items.length);

        renderMaterials(items);
      } catch (error) {
        console.error(`❌ Ошибка загрузки для главы ${chapterData.id}:`, error);
        grid.innerHTML = `<div class="error-msg">⚠️ Не удалось загрузить материалы. Ошибка: ${error.message || 'неизвестная'}</div>`;
      }
    }

    // ================================================================
    // 5. ОТОБРАЖЕНИЕ МАТЕРИАЛОВ
    // ================================================================
    function renderMaterials(items) {
      const grid = document.getElementById('materialsGrid');
      grid.innerHTML = '';
      items.forEach((item, index) => {
        const card = document.createElement('a');
        card.className = 'material-card';
        card.href = item.link;
        card.target = '_blank';
        card.style.animationDelay = `${0.1 + index * 0.05}s`;

        let icon = '📄';
        const lower = item.name.toLowerCase();
        if (lower.includes('теория')) icon = '📘';
        else if (lower.includes('практика')) icon = '✏️';
        else if (lower.includes('тест')) icon = '📝';
        else if (lower.includes('видео')) icon = '🎥';
        else if (lower.includes('презентация')) icon = '📊';
        else if (lower.includes('задание')) icon = '📋';

        card.innerHTML = `
          <span class="icon">${icon}</span>
          <div class="info">
            <div class="name">${item.name}</div>
            <span class="badge">📎 Материал </span>
          </div>
          <span class="arrow">→</span>
        `;

        grid.appendChild(card);
      });
    }

    // ================================================================
    // 6. ПРИНУДИТЕЛЬНОЕ ОБНОВЛЕНИЕ (кнопка)
    // ================================================================
    function forceReload() {
      if (currentChapterId) {
        const chapterData = chapters.find(ch => ch.id === currentChapterId);
        if (chapterData) {
          loadMaterialsForChapter(chapterData);
        }
      }
    }

    // ================================================================
    // 7. ФОНОВЫЕ СИМВОЛЫ
    // ================================================================
    (function createBgSymbols() {
      const container = document.getElementById('bgSymbols');
      if (!container) return;
      const symbols = ['∫', '∑', 'π', '√', '∞', '∂', '∇', 'Δ', 'θ', 'λ', 'σ', 'φ', 'ω', 'x²', '∠'];
      for (let i = 0; i < 12; i++) {
        const span = document.createElement('span');
        span.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        const size = 60 + Math.random() * 100;
        span.style.fontSize = size + 'px';
        span.style.left = Math.random() * 100 + '%';
        span.style.top = Math.random() * 100 + '%';
        span.style.animationDelay = (Math.random() * 10) + 's';
        span.style.opacity = 0.02 + Math.random() * 0.06;
        container.appendChild(span);
      }
    })();

    // ================================================================
    // 8. ПРОГРЕСС-БАР
    // ================================================================
    (function setupProgressBar() {
      const fill = document.getElementById('progressFill');
      if (!fill) return;
      const updateProgress = () => {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
        fill.style.width = Math.min(100, progress) + '%';
      };
      window.addEventListener('scroll', updateProgress, { passive: true });
      window.addEventListener('resize', updateProgress, { passive: true });
      updateProgress();
    })();

    // ================================================================
    // 9. ФИЗИКА КНОПКИ (сопротивление среде)
    // ================================================================
    const backLink = document.getElementById('backLink');
    const SPRING = 0.12;
    const DAMPING = 0.88;
    const MAX_OFFSET = 35;
    const SENSITIVITY = 0.06;

    let targetOffset = 0;
    let currentOffset = 0;
    let velocity = 0;
    let lastScrollY = window.scrollY;
    let animationId = null;

    function updatePhysics() {
      const force = (targetOffset - currentOffset) * SPRING;
      velocity += force;
      velocity *= DAMPING;
      currentOffset += velocity;

      if (Math.abs(currentOffset) > MAX_OFFSET) {
        currentOffset = Math.sign(currentOffset) * MAX_OFFSET;
        velocity *= 0.5;
      }

      const rotation = currentOffset * 0.15;
      const scale = 1 - Math.abs(currentOffset) * 0.003;
      backLink.style.transform = `translateY(${currentOffset}px) rotate(${rotation}deg) scale(${scale})`;

      if (Math.abs(velocity) > 0.01 || Math.abs(currentOffset - targetOffset) > 0.1) {
        animationId = requestAnimationFrame(updatePhysics);
      } else {
        currentOffset = targetOffset;
        backLink.style.transform = `translateY(${currentOffset}px) rotate(0deg) scale(1)`;
        animationId = null;
      }
    }

    let scrollTimeout = null;
    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      const delta = scrollY - lastScrollY;
      let newTarget = targetOffset - delta * SENSITIVITY;
      newTarget = Math.max(-MAX_OFFSET, Math.min(MAX_OFFSET, newTarget));
      targetOffset = newTarget;
      lastScrollY = scrollY;

      if (!animationId) {
        animationId = requestAnimationFrame(updatePhysics);
      }

      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        targetOffset = 0;
        if (!animationId) {
          animationId = requestAnimationFrame(updatePhysics);
        }
      }, 250);
    });
  </script>

</body>
