<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EPALLAXIS</title>

<style>
:root{
  --bg:#060a10;
  --panel:#0f1720;
  --panel2:#111c26;
  --text:#e8f0ea;
  --muted:#9aa4b2;
  --accent:#22ff88;
  --border:rgba(34,255,136,0.18);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

body{
  background:radial-gradient(1200px 600px at 20% 0%, #0d1f18 0%, var(--bg) 60%);
  color:var(--text);
  overflow-x:hidden;
}

/* ================= HEADER ================= */

header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(6,10,16,0.75);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:18px 20px;
}

.brand{
  max-width:1100px;
  margin:0 auto;
}

.brand h1{
  font-size:22px;
  letter-spacing:2px;
}

.brand p{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

/* ================= HERO ================= */

.hero{
  max-width:1100px;
  margin:0 auto;
  padding:70px 20px 40px;
  display:flex;
  justify-content:space-between;
  gap:40px;
  align-items:center;
}

.hero h1{
  font-size:52px;
  line-height:1.05;
}

.hero h1 span{
  color:var(--accent);
}

.hero p{
  margin-top:12px;
  color:var(--muted);
  max-width:420px;
}

.buttons{
  margin-top:20px;
}

.btn{
  display:inline-block;
  padding:11px 14px;
  border-radius:12px;
  cursor:pointer;
  border:1px solid var(--accent);
  color:var(--accent);
  transition:0.25s;
}

.btn:hover{
  background:rgba(34,255,136,0.08);
  transform:translateY(-2px);
}

/* ================= GRID ================= */

.grid{
  max-width:1100px;
  margin:0 auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

/* ================= CARD ================= */

.card{
  background:linear-gradient(145deg,var(--panel),var(--panel2));
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  border-color:var(--accent);
  box-shadow:0 0 25px rgba(34,255,136,0.08);
}

.card h3{margin-top:8px}
.card p{margin-top:6px;color:var(--muted);font-size:13px}

.go{
  margin-top:12px;
  color:var(--accent);
  font-size:13px;
}

/* ================= HERO BOX (LAVA FIXED) ================= */

.hero-box{
  width:300px;
  height:260px;
  border-radius:22px;
  border:1px solid var(--border);
  background:linear-gradient(145deg,var(--panel),var(--panel2));
  position:relative;
  overflow:hidden;
  flex-shrink:0;
  box-shadow:0 0 40px rgba(34,255,136,0.05);
}

/* grid */
.hero-box::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(transparent 49%, rgba(34,255,136,0.04) 50%, transparent 51%),
    linear-gradient(90deg, transparent 49%, rgba(34,255,136,0.04) 50%, transparent 51%);
  background-size:34px 34px;
  opacity:0.7;
}

/* glow */
.hero-box::after{
  content:"";
  position:absolute;
  inset:-40%;
  background:radial-gradient(circle at 50% 70%, rgba(34,255,136,0.12), transparent 60%);
  animation:breath 6s ease-in-out infinite;
}

@keyframes breath{
  0%,100%{transform:scale(1);opacity:0.4;}
  50%{transform:scale(1.08);opacity:0.6;}
}

/* lava symbols */
.lava{
  position:absolute;
  bottom:-20px;
  color:rgba(34,255,136,0.35);
  font-size:14px;
  pointer-events:none;
  text-shadow:0 0 10px rgba(34,255,136,0.25);
}

/* ================= OVERLAY ================= */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;

  opacity:0;
  pointer-events:none;
  transition:0.3s ease;
}

.overlay.active{
  opacity:1;
  pointer-events:auto;
}

.panel{
  width:340px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
  transform:translateY(20px) scale(0.97);
  opacity:0;
  transition:0.3s ease;
}

.overlay.active .panel{
  transform:translateY(0) scale(1);
  opacity:1;
}

.option{
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid var(--border);
  cursor:pointer;
  transition:0.25s;
}

.option:hover{
  border-color:var(--accent);
  background:rgba(34,255,136,0.05);
}

</style>
</head>

<body>

<header>
  <div class="brand">
    <h1>EPALLAXIS <span style="color:#22ff88">math</span></h1>
    <p>Ἐπαλλάσσω — приводить систему в порядок</p>
  </div>
</header>

<section class="hero">
  <div>
    <h1>МАТЕМАТИКА<br><span>5–11 КЛАССЫ</span></h1>
    <p>Структурированная система обучения: теория, практика, экзамены.</p>
    <div class="buttons">
      <div class="btn" onclick="scrollToClasses()">Выбрать класс</div>
    </div>
  </div>

  <div class="hero-box" id="lavaBox"></div>
</section>

<section class="grid" id="grid"></section>

<footer style="text-align:center;padding:40px;color:var(--muted)">
  EPALLAXIS — Mathematics System 2026
</footer>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="panel">
    <h3 id="title">Выбор</h3>
    <div id="options"></div>
  </div>
</div>

<script>

const classes=[5,6,7,8,9,10,11];

const grid=document.getElementById("grid");
const overlay=document.getElementById("overlay");
const options=document.getElementById("options");
const title=document.getElementById("title");

function classLink(n){
  return `class${n}.html`;
}

/* ================= CARDS ================= */

classes.forEach(n=>{
  const el=document.createElement("div");
  el.className="card";

  el.innerHTML=`
    <h3>${n} класс</h3>
    <p>Базовая структура обучения</p>
    <div class="go">перейти →</div>
  `;

  el.onclick=()=>openClass(n);
  grid.appendChild(el);
});

/* ================= NAV ================= */

function openClass(n){

  if(n<=6){
    window.location.href = classLink(n);
    return;
  }

  overlay.classList.add("active");
  options.innerHTML="";
  title.innerText=n+" класс";

  let items=[];

  if(n<=8) items=["Алгебра","Геометрия"];
  else if(n===9) items=["Алгебра","Геометрия","Экзамен"];
  else if(n===10) items=["Алгебра","Геометрия"];
  else items=["Алгебра","Геометрия","ЦЭ / ЦТ"];

  items.forEach(i=>{
    const d=document.createElement("div");
    d.className="option";
    d.innerText=i;

    d.onclick=()=>{
      overlay.classList.remove("active");
      setTimeout(()=>{
        window.location.href = classLink(n) + "?type=" + encodeURIComponent(i);
      },250);
    };

    options.appendChild(d);
  });
}

/* close overlay */
overlay.onclick=(e)=>{
  if(e.target===overlay){
    overlay.classList.remove("active");
  }
};

function scrollToClasses(){
  document.getElementById("grid").scrollIntoView({behavior:"smooth"});
}

/* ================= LAVA LAMP ================= */

const box=document.getElementById("lavaBox");
const symbols=["√","∑","π","∫","∞","x²","a","b","c","∠"];

function spawn(){
  const el=document.createElement("div");
  el.className="lava";
  el.innerText=symbols[Math.floor(Math.random()*symbols.length)];

  const x = Math.random()*260;
  el.style.left = x+"px";

  const size = 12 + Math.random()*16;
  el.style.fontSize = size+"px";

  const duration = 4000 + Math.random()*3000;
  el.style.animation = `rise ${duration}ms linear forwards`;

  box.appendChild(el);

  let y = 0;
  const speed = 0.6 + Math.random()*0.7;

  function move(){
    y += speed;
    el.style.transform = `translateY(${-y}px)`;

    if(y > 320){
      el.remove();
      return;
    }
    requestAnimationFrame(move);
  }

  requestAnimationFrame(move);
}

const style=document.createElement("style");
style.innerHTML=`
@keyframes rise{
  from{opacity:0; transform:translateY(0);}
  10%{opacity:1;}
  to{opacity:0; transform:translateY(-320px);}
}
`;
document.head.appendChild(style);

/* density */
setInterval(spawn, 120);

</script>

</body>
</html>
