<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EPALLAXIS</title>

  <style>
    /* ===== Глобальные переменные ===== */
    :root {
      --bg: #060a10;
      --panel: #0f1720;
      --panel2: #111c26;
      --text: #e8f0ea;
      --muted: #9aa4b2;
      --accent: #22ff88;
      --border: rgba(34, 255, 136, 0.18);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    }

    body {
      background: radial-gradient(1200px 600px at 20% 0%, #0d1f18 0%, var(--bg) 60%);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6, 10, 16, 0.75);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
    }

    .brand {
      max-width: 1100px;
      margin: 0 auto;
    }

    .brand h1 {
      font-size: clamp(20px, 4vw, 28px);
      letter-spacing: 2px;
    }

    .brand h1 span {
      color: var(--accent);
    }

    .brand p {
      font-size: clamp(11px, 1.5vw, 14px);
      color: var(--muted);
      margin-top: 4px;
    }

    /* ===== HERO ===== */
    .hero {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 30px;
      display: flex;
      justify-content: space-between;
      gap: 30px;
      align-items: center;
    }

    .hero-content {
      flex: 1;
    }

    .hero-content h1 {
      font-size: clamp(32px, 6vw, 56px);
      line-height: 1.05;
    }

    .hero-content h1 span {
      color: var(--accent);
    }

    .hero-content p {
      margin-top: 12px;
      color: var(--muted);
      max-width: 420px;
      font-size: clamp(14px, 1.4vw, 18px);
    }

    .buttons {
      margin-top: 24px;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid var(--accent);
      color: var(--accent);
      transition: 0.25s;
      font-size: clamp(14px, 1.2vw, 18px);
      background: transparent;
      text-decoration: none;
    }

    .btn:hover {
      background: rgba(34, 255, 136, 0.08);
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(34, 255, 136, 0.1);
    }

    /* ===== Hero Box (статичный декоративный блок) ===== */
    .hero-box {
      width: 280px;
      height: 240px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: linear-gradient(145deg, var(--panel), var(--panel2));
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 0 40px rgba(34, 255, 136, 0.05);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
      padding: 15px;
    }

    /* Сетка (линии) */
    .hero-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(transparent 49%, rgba(34, 255, 136, 0.04) 50%, transparent 51%),
        linear-gradient(90deg, transparent 49%, rgba(34, 255, 136, 0.04) 50%, transparent 51%);
      background-size: 34px 34px;
      opacity: 0.7;
    }

    /* Символы внутри сетки */
    .hero-box .symbol {
      font-size: clamp(18px, 2.5vw, 26px);
      color: rgba(34, 255, 136, 0.3);
      text-shadow: 0 0 12px rgba(34, 255, 136, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .hero-box .symbol:hover {
      color: rgba(34, 255, 136, 0.6);
      transform: scale(1.1);
    }

    /* ===== GRID КАРТОЧЕК ===== */
    .grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      flex: 1;
    }

    .card {
      background: linear-gradient(145deg, var(--panel), var(--panel2));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(34, 255, 136, 0.08);
    }

    .card h3 {
      font-size: clamp(18px, 2.5vw, 24px);
      margin-top: 8px;
    }

    .card p {
      margin-top: 6px;
      color: var(--muted);
      font-size: clamp(12px, 1.2vw, 14px);
      flex: 1;
    }

    .go {
      margin-top: 16px;
      color: var(--accent);
      font-size: clamp(13px, 1.2vw, 15px);
      font-weight: 500;
      transition: 0.3s;
    }

    .card:hover .go {
      transform: translateX(4px);
    }

    /* ===== OVERLAY ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s ease;
      z-index: 200;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-panel {
      width: 90%;
      max-width: 400px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      transform: translateY(20px) scale(0.97);
      opacity: 0;
      transition: 0.3s ease;
    }

    .overlay.active .overlay-panel {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .overlay-panel h3 {
      font-size: clamp(20px, 4vw, 28px);
      margin-bottom: 12px;
    }

    .option {
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: 0.25s;
      font-size: clamp(16px, 2vw, 20px);
      text-align: center;
    }

    .option:hover {
      border-color: var(--accent);
      background: rgba(34, 255, 136, 0.05);
      transform: scale(1.02);
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 30px 20px;
      color: var(--muted);
      font-size: clamp(12px, 1.2vw, 14px);
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    /* ============================================================
       АДАПТИВНОСТЬ
    ============================================================ */

    /* Планшеты и маленькие ноутбуки */
    @media (max-width: 900px) {
      .hero {
        padding: 30px 20px 20px;
        gap: 20px;
      }

      .hero-box {
        width: 220px;
        height: 200px;
      }
    }

    /* Телефоны */
    @media (max-width: 640px) {
      .hero {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
        padding: 20px 16px 10px;
      }

      .hero-content p {
        max-width: 100%;
        margin-left: auto;
        margin-right: auto;
      }

      .hero-box {
        width: 100%;
        height: 180px;
        margin-top: 10px;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(3, 1fr);
        padding: 10px;
      }

      .grid {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        padding: 12px;
      }

      .card {
        padding: 14px;
      }

      .overlay-panel {
        padding: 16px;
        width: 95%;
        max-width: 360px;
      }

      .option {
        padding: 16px;
        font-size: 18px;
      }

      header {
        padding: 10px 16px;
      }

      .btn {
        padding: 14px 28px;
        width: 100%;
        max-width: 260px;
      }

      .buttons {
        display: flex;
        justify-content: center;
      }
    }

    /* Очень маленькие телефоны (ширина < 400px) */
    @media (max-width: 400px) {
      .hero-content h1 {
        font-size: 28px;
      }
      .hero-box {
        height: 150px;
        gap: 4px;
      }
      .grid {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .card h3 {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="brand">
      <h1>EPALLAXIS <span>math</span></h1>
      <p>Ἐπαλλάσσω — приводить систему в порядок</p>
    </div>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>МАТЕМАТИКА<br><span>5–11 КЛАССЫ</span></h1>
      <p>Структурированная система обучения: теория, практика, экзамены.</p>
      <div class="buttons">
        <div class="btn" onclick="scrollToClasses()">Выбрать класс</div>
      </div>
    </div>

    <div class="hero-box" id="staticBox">
      <div class="symbol">√</div>
      <div class="symbol">∑</div>
      <div class="symbol">π</div>
      <div class="symbol">∫</div>
      <div class="symbol">∞</div>
      <div class="symbol">x²</div>
      <div class="symbol">a</div>
      <div class="symbol">b</div>
      <div class="symbol">c</div>
      <div class="symbol">∠</div>
      <div class="symbol">α</div>
      <div class="symbol">β</div>
    </div>
  </section>

  <section class="grid" id="grid"></section>

  <footer>
    EPALLAXIS — Mathematics System 2026
  </footer>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <h3 id="overlayTitle">Выбор</h3>
      <div id="optionsContainer"></div>
    </div>
  </div>

  <script>
    // ===== Данные классов =====
    const classes = [5, 6, 7, 8, 9, 10, 11];

    const grid = document.getElementById('grid');
    const overlay = document.getElementById('overlay');
    const optionsContainer = document.getElementById('optionsContainer');
    const overlayTitle = document.getElementById('overlayTitle');

    // ===== Генерация карточек =====
    classes.forEach(n => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h3>${n} класс</h3>
        <p>Базовая структура обучения</p>
        <div class="go">перейти →</div>
      `;
      card.addEventListener('click', () => openClass(n));
      grid.appendChild(card);
    });

    // ===== Логика открытия класса =====
    function openClass(n) {
      if (n <= 6) {
        // Для 5–6 сразу переходим на страницу класса (пока заглушка)
        // В будущем будет class.html?class=...
        alert(`Переход к ${n} классу (страница в разработке)`);
        return;
      }

      // Для 7–11 показываем оверлей с предметами
      overlay.classList.add('active');
      optionsContainer.innerHTML = '';
      overlayTitle.textContent = `${n} класс`;

      let items = [];
      if (n === 7 || n === 8) items = ['Алгебра', 'Геометрия'];
      else if (n === 9) items = ['Алгебра', 'Геометрия', 'Экзамен'];
      else if (n === 10) items = ['Алгебра', 'Геометрия'];
      else if (n === 11) items = ['Алгебра', 'Геометрия', 'ЦЭ / ЦТ'];

      items.forEach(item => {
        const option = document.createElement('div');
        option.className = 'option';
        option.textContent = item;
        option.addEventListener('click', () => {
          overlay.classList.remove('active');
          // Заглушка: переход к предмету (позже class.html?class=...&subject=...)
          alert(`Переход к ${n} классу, предмет "${item}" (страница в разработке)`);
        });
        optionsContainer.appendChild(option);
      });
    }

    // ===== Закрытие оверлея по клику на фон =====
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        overlay.classList.remove('active');
      }
    });

    // ===== Скролл к карточкам =====
    function scrollToClasses() {
      document.getElementById('grid').scrollIntoView({ behavior: 'smooth' });
    }

    // ===== Закрытие оверлея по ESC (опционально) =====
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('active')) {
        overlay.classList.remove('active');
      }
    });
  </script>

</body>
</html>
