<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EPALLAXIS</title>

  <style>
    /* ===== Глобальные переменные ===== */
    :root {
      --bg: #060a10;
      --panel: #0f1720;
      --panel2: #111c26;
      --text: #e8f0ea;
      --muted: #9aa4b2;
      --accent: #22ff88;
      --gold: #ffd700;
      --gold-light: #ffe066;
      --gold-dark: #b8860b;
      --silver: #c0c0c0;
      --silver-light: #e8e8e8;
      --silver-dark: #a0a0a0;
      --exam-blue: #1a2a4a;
      --exam-blue-light: #3a5a8a;
      --border: rgba(34, 255, 136, 0.18);
      --gold-border: rgba(255, 215, 0, 0.5);
      --exam-border: rgba(192, 192, 192, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    }

    body {
      background: radial-gradient(1200px 600px at 20% 0%, #0d1f18 0%, var(--bg) 60%);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6, 10, 16, 0.75);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
    }

    .brand {
      max-width: 1100px;
      margin: 0 auto;
    }

    .brand h1 {
      font-size: clamp(20px, 4vw, 28px);
      letter-spacing: 2px;
    }

    .brand h1 span {
      color: var(--accent);
    }

    .brand p {
      font-size: clamp(11px, 1.5vw, 14px);
      color: var(--muted);
      margin-top: 4px;
    }

    /* ===== HERO ===== */
    .hero {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 30px;
      display: flex;
      justify-content: space-between;
      gap: 30px;
      align-items: center;
    }

    .hero-content {
      flex: 1;
    }

    .hero-content h1 {
      font-size: clamp(32px, 6vw, 56px);
      line-height: 1.05;
    }

    .hero-content h1 span {
      color: var(--accent);
    }

    .hero-content p {
      margin-top: 12px;
      color: var(--muted);
      max-width: 420px;
      font-size: clamp(14px, 1.4vw, 18px);
    }

    .buttons {
      margin-top: 24px;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid var(--accent);
      color: var(--accent);
      transition: 0.25s;
      font-size: clamp(14px, 1.2vw, 18px);
      background: transparent;
      text-decoration: none;
    }

    .btn:hover {
      background: rgba(34, 255, 136, 0.08);
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(34, 255, 136, 0.1);
    }

    /* ===== Hero Box ===== */
    .hero-box {
      width: 280px;
      height: 240px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: linear-gradient(145deg, var(--panel), var(--panel2));
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 0 40px rgba(34, 255, 136, 0.05);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
      padding: 15px;
    }

    .hero-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(transparent 49%, rgba(34, 255, 136, 0.04) 50%, transparent 51%),
        linear-gradient(90deg, transparent 49%, rgba(34, 255, 136, 0.04) 50%, transparent 51%);
      background-size: 34px 34px;
      opacity: 0.7;
    }

    .hero-box .symbol {
      font-size: clamp(18px, 2.5vw, 26px);
      color: rgba(34, 255, 136, 0.3);
      text-shadow: 0 0 12px rgba(34, 255, 136, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .hero-box .symbol:hover {
      color: rgba(34, 255, 136, 0.6);
      transform: scale(1.1);
    }

    /* ===== GRID ===== */
    .grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      flex: 1;
    }

    .card {
      background: linear-gradient(145deg, var(--panel), var(--panel2));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      cursor: pointer;
      transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: visible;
      z-index: 1;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(34, 255, 136, 0.08);
    }

    .card h3 {
      font-size: clamp(18px, 2.5vw, 24px);
      margin-top: 8px;
    }

    .card p {
      margin-top: 6px;
      color: var(--muted);
      font-size: clamp(12px, 1.2vw, 14px);
      flex: 1;
    }

    .go {
      margin-top: 16px;
      color: var(--accent);
      font-size: clamp(13px, 1.2vw, 15px);
      font-weight: 500;
      transition: 0.3s;
    }

    .card:hover .go {
      transform: translateX(4px);
    }

    /* =============================================================
       11 КЛАСС — ЗОЛОТАЯ ЧЕМПИОНСКАЯ КАРТОЧКА (УЛУЧШЕНА В 10 РАЗ)
    ============================================================= */
    .card-gold {
      border: 2px solid var(--gold-border);
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.12), rgba(255, 215, 0, 0.03), rgba(255, 215, 0, 0.12));
      background-size: 300% 300%;
      animation: goldPulse 3s ease-in-out infinite;
      box-shadow: 0 0 50px rgba(255, 215, 0, 0.08);
      z-index: 2;
      overflow: visible !important;
    }

    .card-gold::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 20px;
      padding: 3px;
      background: conic-gradient(from var(--angle), var(--gold), var(--gold-light), var(--gold), var(--gold-dark), var(--gold));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: rotateBorder 8s linear infinite;
      z-index: -1;
      pointer-events: none;
    }

    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    @keyframes rotateBorder {
      to { --angle: 360deg; }
    }

    .card-gold:hover {
      transform: translateY(-10px) scale(1.03);
      border-color: var(--gold);
      box-shadow: 0 0 80px rgba(255, 215, 0, 0.35), 0 0 150px rgba(255, 215, 0, 0.15);
    }

    .card-gold .go {
      color: var(--gold);
      text-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
    }

    /* Декорации золота */
    .gold-deco {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      transition: transform 0.4s ease, filter 0.4s ease;
    }

    .laurel-left-gold {
      top: -12px;
      left: -12px;
      font-size: 44px;
      animation: laurelSway 3.5s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
    }

    .laurel-right-gold {
      top: -12px;
      right: -12px;
      font-size: 44px;
      animation: laurelSway 3.5s ease-in-out infinite reverse;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
    }

    @keyframes laurelSway {
      0%, 100% { transform: rotate(-8deg) scale(1); }
      50% { transform: rotate(8deg) scale(1.08); }
    }

    .trophy-gold {
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 56px;
      animation: trophyFloatGold 3s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
      text-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
      z-index: 6;
    }

    @keyframes trophyFloatGold {
      0%, 100% { transform: translateX(-50%) translateY(0) scale(1) rotate(-3deg); }
      50% { transform: translateX(-50%) translateY(-12px) scale(1.08) rotate(3deg); }
    }

    .ribbon-gold {
      bottom: 10px;
      left: 10px;
      font-size: 28px;
      animation: ribbonWave 4s ease-in-out infinite;
      filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.3));
    }

    @keyframes ribbonWave {
      0%, 100% { transform: rotate(-5deg) scale(1); }
      50% { transform: rotate(5deg) scale(1.1); }
    }

    .sparkle-gold {
      position: absolute;
      font-size: 14px;
      color: var(--gold);
      opacity: 0;
      animation: sparkleFallGold 5s linear infinite;
      pointer-events: none;
      z-index: 4;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
    }

    .sparkle-gold:nth-child(1) { left: 5%; animation-delay: 0s; }
    .sparkle-gold:nth-child(2) { left: 15%; animation-delay: 0.8s; }
    .sparkle-gold:nth-child(3) { left: 25%; animation-delay: 1.6s; }
    .sparkle-gold:nth-child(4) { left: 35%; animation-delay: 0.4s; }
    .sparkle-gold:nth-child(5) { left: 45%; animation-delay: 2.0s; }
    .sparkle-gold:nth-child(6) { left: 55%; animation-delay: 1.2s; }
    .sparkle-gold:nth-child(7) { left: 65%; animation-delay: 2.8s; }
    .sparkle-gold:nth-child(8) { left: 75%; animation-delay: 0.2s; }
    .sparkle-gold:nth-child(9) { left: 85%; animation-delay: 1.0s; }
    .sparkle-gold:nth-child(10) { left: 95%; animation-delay: 2.4s; }

    @keyframes sparkleFallGold {
      0% { opacity: 0; transform: translateY(-30px) scale(0.5) rotate(0deg); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(160px) scale(1.3) rotate(720deg); }
    }

    .card-gold:hover .sparkle-gold {
      animation-duration: 3s;
    }

    .card-gold:hover .trophy-gold {
      animation-duration: 1.5s;
    }

    .card-gold:hover .laurel-left-gold,
    .card-gold:hover .laurel-right-gold {
      animation-duration: 1.8s;
    }

    @keyframes goldPulse {
      0%, 100% { background-position: 0% 50%; box-shadow: 0 0 40px rgba(255, 215, 0, 0.05); }
      50% { background-position: 100% 50%; box-shadow: 0 0 70px rgba(255, 215, 0, 0.15); }
    }

    /* =============================================================
       9 КЛАСС — СЕРЕБРЯНО-СИНЯЯ АКАДЕМИЧЕСКАЯ КАРТОЧКА (УЛУЧШЕНА В 10 РАЗ)
    ============================================================= */
    .card-exam {
      border: 2px solid var(--exam-border);
      background: linear-gradient(135deg, rgba(192, 192, 192, 0.08), rgba(26, 42, 74, 0.06), rgba(192, 192, 192, 0.08));
      background-size: 300% 300%;
      animation: examPulse 4s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(192, 192, 192, 0.04);
      z-index: 2;
      overflow: visible !important;
    }

    .card-exam::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 20px;
      padding: 3px;
      background: conic-gradient(from var(--angle-exam), var(--silver), var(--exam-blue-light), var(--silver), var(--exam-blue), var(--silver));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: rotateBorderExam 10s linear infinite;
      z-index: -1;
      pointer-events: none;
    }

    @property --angle-exam {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    @keyframes rotateBorderExam {
      to { --angle-exam: 360deg; }
    }

    .card-exam:hover {
      transform: translateY(-10px) scale(1.03);
      border-color: var(--silver);
      box-shadow: 0 0 70px rgba(192, 192, 192, 0.25), 0 0 140px rgba(26, 42, 74, 0.15);
    }

    .card-exam .go {
      color: var(--silver);
      text-shadow: 0 0 20px rgba(192, 192, 192, 0.3);
    }

    /* Декорации экзамена */
    .exam-deco {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      transition: transform 0.4s ease, filter 0.4s ease;
    }

    .cap-exam {
      top: -12px;
      left: -8px;
      font-size: 42px;
      animation: capFloat 5s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(192, 192, 192, 0.4));
    }

    @keyframes capFloat {
      0%, 100% { transform: translateY(0) rotate(-5deg) scale(1); }
      50% { transform: translateY(-10px) rotate(5deg) scale(1.05); }
    }

    .scroll-exam {
      bottom: -8px;
      left: 10px;
      font-size: 32px;
      animation: scrollSway 4s ease-in-out infinite;
      filter: drop-shadow(0 0 15px rgba(192, 192, 192, 0.2));
    }

    @keyframes scrollSway {
      0%, 100% { transform: rotate(-10deg) scale(1); }
      50% { transform: rotate(10deg) scale(1.1); }
    }

    .diploma-exam {
      bottom: -8px;
      right: 10px;
      font-size: 34px;
      animation: diplomaFloat 3.5s ease-in-out infinite;
      filter: drop-shadow(0 0 15px rgba(192, 192, 192, 0.2));
    }

    @keyframes diplomaFloat {
      0%, 100% { transform: translateY(0) rotate(3deg) scale(1); }
      50% { transform: translateY(-6px) rotate(-3deg) scale(1.05); }
    }

    /* Множество серебряных искр */
    .sparkle-exam {
      position: absolute;
      font-size: 12px;
      color: var(--silver);
      opacity: 0;
      animation: sparkleFallExam 6s linear infinite;
      pointer-events: none;
      z-index: 4;
      text-shadow: 0 0 6px rgba(192, 192, 192, 0.4);
    }

    .sparkle-exam:nth-child(1) { left: 8%; animation-delay: 0s; }
    .sparkle-exam:nth-child(2) { left: 20%; animation-delay: 1.0s; }
    .sparkle-exam:nth-child(3) { left: 32%; animation-delay: 2.0s; }
    .sparkle-exam:nth-child(4) { left: 44%; animation-delay: 0.5s; }
    .sparkle-exam:nth-child(5) { left: 56%; animation-delay: 2.5s; }
    .sparkle-exam:nth-child(6) { left: 68%; animation-delay: 1.5s; }
    .sparkle-exam:nth-child(7) { left: 80%; animation-delay: 3.0s; }
    .sparkle-exam:nth-child(8) { left: 92%; animation-delay: 0.3s; }

    @keyframes sparkleFallExam {
      0% { opacity: 0; transform: translateY(-40px) scale(0.4) rotate(0deg); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(180px) scale(1.2) rotate(720deg); }
    }

    .card-exam:hover .sparkle-exam {
      animation-duration: 4s;
    }

    .card-exam:hover .cap-exam {
      animation-duration: 2s;
    }

    .card-exam:hover .scroll-exam,
    .card-exam:hover .diploma-exam {
      animation-duration: 2s;
    }

    @keyframes examPulse {
      0%, 100% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(192, 192, 192, 0.03); }
      50% { background-position: 100% 50%; box-shadow: 0 0 60px rgba(192, 192, 192, 0.12); }
    }

    /* ===== OVERLAY ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s ease;
      z-index: 200;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-panel {
      width: 90%;
      max-width: 400px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      transform: translateY(20px) scale(0.97);
      opacity: 0;
      transition: 0.3s ease;
    }

    .overlay.active .overlay-panel {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .overlay-panel h3 {
      font-size: clamp(20px, 4vw, 28px);
      margin-bottom: 12px;
    }

    .option {
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: 0.25s;
      font-size: clamp(16px, 2vw, 20px);
      text-align: center;
    }

    .option:hover {
      border-color: var(--accent);
      background: rgba(34, 255, 136, 0.05);
      transform: scale(1.02);
    }

    /* ===== КНОПКА ЦЭ/ЦТ (УЛУЧШЕНА В 15 РАЗ) ===== */
    .option-champion-gold {
      border: 2px solid var(--gold-border);
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 215, 0, 0.02));
      animation: goldPulse 2s ease-in-out infinite;
      font-weight: 800;
      color: var(--gold);
      position: relative;
      overflow: visible;
      padding: 18px 20px;
      font-size: clamp(18px, 2.5vw, 24px);
      letter-spacing: 1px;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
      transition: all 0.3s ease;
    }

    .option-champion-gold::before {
      content: "🏆";
      margin-right: 10px;
      display: inline-block;
      animation: trophyFloatGold 2s ease-in-out infinite;
    }

    .option-champion-gold::after {
      content: "🏁";
      margin-left: 10px;
      display: inline-block;
      animation: torchFloat 3s ease-in-out infinite;
    }

    .option-champion-gold .stars {
      display: inline-block;
      margin: 0 6px;
      animation: sparkleFallGold 2s linear infinite;
    }

    .option-champion-gold:hover {
      transform: scale(1.08);
      border-color: var(--gold);
      background: rgba(255, 215, 0, 0.15);
      box-shadow: 0 0 80px rgba(255, 215, 0, 0.3), 0 0 150px rgba(255, 215, 0, 0.1);
      color: #fff;
      text-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
    }

    /* ===== КНОПКА "ЭКЗАМЕН" ДЛЯ 9 КЛАССА (УЛУЧШЕННАЯ) ===== */
    .option-exam {
      border: 2px solid var(--exam-border);
      background: linear-gradient(135deg, rgba(192, 192, 192, 0.08), rgba(26, 42, 74, 0.05));
      animation: examPulse 3s ease-in-out infinite;
      font-weight: 700;
      color: var(--silver);
      position: relative;
      overflow: visible;
      padding: 16px 20px;
      font-size: clamp(17px, 2.3vw, 22px);
      letter-spacing: 0.5px;
      text-shadow: 0 0 20px rgba(192, 192, 192, 0.15);
      box-shadow: 0 0 20px rgba(192, 192, 192, 0.05);
      transition: all 0.3s ease;
    }

    .option-exam::before {
      content: "🎓";
      margin-right: 10px;
      display: inline-block;
      animation: capFloat 3s ease-in-out infinite;
    }

    .option-exam::after {
      content: "📜";
      margin-left: 10px;
      display: inline-block;
      animation: scrollSway 3s ease-in-out infinite;
    }

    .option-exam:hover {
      transform: scale(1.06);
      border-color: var(--silver);
      background: rgba(192, 192, 192, 0.12);
      box-shadow: 0 0 60px rgba(192, 192, 192, 0.2), 0 0 120px rgba(26, 42, 74, 0.1);
      color: #fff;
      text-shadow: 0 0 30px rgba(192, 192, 192, 0.5);
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 30px 20px;
      color: var(--muted);
      font-size: clamp(12px, 1.2vw, 14px);
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    /* ============================================================
       АДАПТИВНОСТЬ
    ============================================================ */
    @media (max-width: 900px) {
      .hero {
        padding: 30px 20px 20px;
        gap: 20px;
      }
      .hero-box {
        width: 220px;
        height: 200px;
      }
      .laurel-left-gold, .laurel-right-gold { font-size: 34px; }
      .trophy-gold { font-size: 44px; }
      .cap-exam { font-size: 34px; }
      .scroll-exam, .diploma-exam { font-size: 26px; }
    }

    @media (max-width: 640px) {
      .hero {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
        padding: 20px 16px 10px;
      }
      .hero-content p {
        max-width: 100%;
        margin-left: auto;
        margin-right: auto;
      }
      .hero-box {
        width: 100%;
        height: 180px;
        margin-top: 10px;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(3, 1fr);
        padding: 10px;
      }
      .grid {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        padding: 12px;
      }
      .card {
        padding: 14px;
        overflow: hidden;
      }
      .overlay-panel {
        padding: 16px;
        width: 95%;
        max-width: 360px;
      }
      .option {
        padding: 16px;
        font-size: 18px;
      }
      header {
        padding: 10px 16px;
      }
      .btn {
        padding: 14px 28px;
        width: 100%;
        max-width: 260px;
      }
      .buttons {
        display: flex;
        justify-content: center;
      }

      /* Уменьшаем декор для 11 */
      .laurel-left-gold, .laurel-right-gold {
        font-size: 24px !important;
        top: -6px;
        left: -6px;
        right: -6px;
      }
      .trophy-gold {
        font-size: 32px !important;
        bottom: -8px;
      }
      .ribbon-gold { font-size: 18px; left: 4px; bottom: 4px; }
      .sparkle-gold { font-size: 10px; }

      /* Уменьшаем декор для 9 */
      .cap-exam {
        font-size: 24px !important;
        top: -6px;
        left: -4px;
      }
      .scroll-exam, .diploma-exam {
        font-size: 20px !important;
        bottom: -4px;
      }
      .sparkle-exam { font-size: 9px; }

      .card-gold::before, .card-exam::before {
        display: none;
      }
      .option-champion-gold {
        font-size: 16px;
        padding: 14px;
      }
      .option-champion-gold::before,
      .option-champion-gold::after {
        font-size: 18px;
      }
      .option-exam {
        font-size: 15px;
        padding: 14px;
      }
      .option-exam::before,
      .option-exam::after {
        font-size: 18px;
      }
    }

    @media (max-width: 400px) {
      .hero-content h1 {
        font-size: 28px;
      }
      .hero-box {
        height: 150px;
        gap: 4px;
      }
      .grid {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .card h3 {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="brand">
      <h1>EPALLAXIS <span>math</span></h1>
      <p>Ἐπαλλάσσω — приводить систему в порядок</p>
    </div>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>МАТЕМАТИКА<br><span>5–11 КЛАССЫ</span></h1>
      <p>Структурированная система обучения: теория, практика, экзамены.</p>
      <div class="buttons">
        <div class="btn" onclick="scrollToClasses()">Выбрать класс</div>
      </div>
    </div>

    <div class="hero-box" id="staticBox">
      <div class="symbol">√</div>
      <div class="symbol">∑</div>
      <div class="symbol">π</div>
      <div class="symbol">∫</div>
      <div class="symbol">∞</div>
      <div class="symbol">x²</div>
      <div class="symbol">a</div>
      <div class="symbol">b</div>
      <div class="symbol">c</div>
      <div class="symbol">∠</div>
      <div class="symbol">α</div>
      <div class="symbol">β</div>
    </div>
  </section>

  <section class="grid" id="grid"></section>

  <footer>
    EPALLAXIS — Mathematics System 2026
  </footer>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <h3 id="overlayTitle">Выбор</h3>
      <div id="optionsContainer"></div>
    </div>
  </div>

  <script>
    const classes = [5, 6, 7, 8, 9, 10, 11];
    const grid = document.getElementById('grid');
    const overlay = document.getElementById('overlay');
    const optionsContainer = document.getElementById('optionsContainer');
    const overlayTitle = document.getElementById('overlayTitle');

    // Генерация карточек
    classes.forEach(n => {
      const card = document.createElement('div');
      card.className = 'card';

      if (n === 11) {
        // Золотая карточка 11 класса
        card.classList.add('card-gold');
        card.innerHTML = `
          <span class="gold-deco laurel-left-gold">🌿</span>
          <span class="gold-deco laurel-right-gold">🌿</span>
          <span class="gold-deco trophy-gold">🏆</span>
          <span class="gold-deco ribbon-gold">🎗️</span>
          <span class="sparkle-gold">✦</span>
          <span class="sparkle-gold">✦</span>
          <span class="sparkle-gold">✦</span>
          <span class="sparkle-gold">✦</span>
          <span class="sparkle-gold">✦</span>
          <span class="sparkle-gold">✦</span>
          <span class="sparkle-gold">✦</span>
          <span class="sparkle-gold">✦</span>
          <span class="sparkle-gold">✦</span>
          <span class="sparkle-gold">✦</span>
          <h3>${n} класс</h3>
          <p>Чемпионский выпуск!</p>
          <div class="go">перейти →</div>
        `;
      } else if (n === 9) {
        // Серебряно-синяя академическая карточка 9 класса (улучшена в 10 раз)
        card.classList.add('card-exam');
        card.innerHTML = `
          <span class="exam-deco cap-exam">🎓</span>
          <span class="exam-deco scroll-exam">📜</span>
          <span class="exam-deco diploma-exam">📄</span>
          <span class="sparkle-exam">✦</span>
          <span class="sparkle-exam">✦</span>
          <span class="sparkle-exam">✦</span>
          <span class="sparkle-exam">✦</span>
          <span class="sparkle-exam">✦</span>
          <span class="sparkle-exam">✦</span>
          <span class="sparkle-exam">✦</span>
          <span class="sparkle-exam">✦</span>
          <h3>${n} класс</h3>
          <p>Экзаменационный выпуск</p>
          <div class="go">перейти →</div>
        `;
      } else {
        card.innerHTML = `
          <h3>${n} класс</h3>
          <p>Базовая структура обучения</p>
          <div class="go">перейти →</div>
        `;
      }

      card.addEventListener('click', () => openClass(n));
      grid.appendChild(card);
    });

    // Логика открытия класса
    function openClass(n) {
      if (n <= 6) {
        alert(`Переход к ${n} классу (страница в разработке)`);
        return;
      }

      overlay.classList.add('active');
      optionsContainer.innerHTML = '';
      overlayTitle.textContent = `${n} класс`;

      let items = [];
      if (n === 7 || n === 8) items = ['Алгебра', 'Геометрия'];
      else if (n === 9) items = ['Алгебра', 'Геометрия', 'Экзамен'];
      else if (n === 10) items = ['Алгебра', 'Геометрия'];
      else if (n === 11) items = ['Алгебра', 'Геометрия', 'ЦЭ / ЦТ'];

      items.forEach(item => {
        const option = document.createElement('div');
        option.className = 'option';

        if (n === 11 && item === 'ЦЭ / ЦТ') {
          option.classList.add('option-champion-gold');
          option.innerHTML = `
            <span class="stars">✧</span>
            ${item}
            <span class="stars">✧</span>
          `;
        } else if (n === 9 && item === 'Экзамен') {
          option.classList.add('option-exam');
          option.innerHTML = item;
        } else {
          option.textContent = item;
        }

        option.addEventListener('click', () => {
          overlay.classList.remove('active');
          alert(`Переход к ${n} классу, предмет "${item}" (страница в разработке)`);
        });
        optionsContainer.appendChild(option);
      });
    }

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        overlay.classList.remove('active');
      }
    });

    function scrollToClasses() {
      document.getElementById('grid').scrollIntoView({ behavior: 'smooth' });
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('active')) {
        overlay.classList.remove('active');
      }
    });
  </script>

</body>
</html>
