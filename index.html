<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EPALLAXIS</title>

  <style>
    /* ===== Глобальные переменные (только зелёная тема) ===== */
    :root {
      --bg: #060a10;
      --panel: #0f1720;
      --panel2: #111c26;
      --text: #e8f0ea;
      --muted: #9aa4b2;
      --accent: #22ff88;
      --border: rgba(34, 255, 136, 0.18);
    }

    /* ===== Плавные переходы (для анимаций, но не для смены темы) ===== */
    * {
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    /* ===== Базовые стили ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    }

    body {
      background: radial-gradient(1200px 600px at 20% 0%, #0d1f18 0%, var(--bg) 60%);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: opacity 0.5s ease;
      padding: 0 20px 40px; /* отступы для контента */
    }

    /* ============================================================
       БАЗОВЫЕ КЛЮЧЕВЫЕ КАДРЫ ДЛЯ АНИМАЦИЙ
    ============================================================ */
    @keyframes fadeInDown {
      0% { opacity: 0; transform: translateY(-30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInLeft {
      0% { opacity: 0; transform: translateX(-40px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeInRight {
      0% { opacity: 0; transform: translateX(40px) scale(0.96) rotate(-4deg); }
      100% { opacity: 1; transform: translateX(0) scale(1) rotate(0deg); }
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardFadeIn {
      0% { opacity: 0; transform: translateY(30px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes heroSymbolsFade {
      0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* ============================================================
       HEADER — исправлен (без отрицательных margin)
    ============================================================ */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6, 10, 16, 0.75);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.5s, border-color 0.5s;
      width: 100%;
      box-sizing: border-box;
      opacity: 0;
      animation: fadeInDown 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand h1 {
      font-size: clamp(20px, 4vw, 28px);
      letter-spacing: 2px;
      line-height: 1.1;
    }

    .brand h1 span {
      color: var(--accent);
    }

    .brand p {
      font-size: clamp(11px, 1.5vw, 14px);
      color: var(--muted);
      margin-top: 2px;
    }

    /* ============================================================
       HERO
    ============================================================ */
    .hero {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 30px;
      display: flex;
      justify-content: space-between;
      gap: 30px;
      align-items: center;
      flex: 1;
    }

    .hero-content {
      flex: 1;
      opacity: 0;
      animation: fadeInLeft 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.15s;
    }

    .hero-content h1 {
      font-size: clamp(32px, 6vw, 56px);
      line-height: 1.05;
      opacity: 0;
      animation: fadeInLeft 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.2s;
    }

    .hero-content h1 span {
      color: var(--accent);
    }

    .hero-content p {
      margin-top: 12px;
      color: var(--muted);
      max-width: 420px;
      font-size: clamp(14px, 1.4vw, 18px);
      opacity: 0;
      animation: fadeInLeft 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.35s;
    }

    .buttons {
      margin-top: 24px;
      opacity: 0;
      animation: fadeInLeft 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.5s;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid var(--accent);
      color: var(--accent);
      transition: 0.25s;
      font-size: clamp(14px, 1.2vw, 18px);
      background: transparent;
      text-decoration: none;
    }

    .btn:hover {
      background: rgba(34, 255, 136, 0.08);
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(34, 255, 136, 0.1);
    }

    /* ===== Hero Box ===== */
    .hero-box {
      width: 280px;
      height: 240px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: linear-gradient(145deg, var(--panel), var(--panel2));
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 0 40px rgba(34, 255, 136, 0.05);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
      padding: 15px;
      opacity: 0;
      animation: fadeInRight 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.25s;
    }

    .hero-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(transparent 49%, rgba(34, 255, 136, 0.04) 50%, transparent 51%),
        linear-gradient(90deg, transparent 49%, rgba(34, 255, 136, 0.04) 50%, transparent 51%);
      background-size: 34px 34px;
      opacity: 0.7;
    }

    .hero-box .symbol {
      font-size: clamp(18px, 2.5vw, 26px);
      color: rgba(34, 255, 136, 0.3);
      text-shadow: 0 0 12px rgba(34, 255, 136, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
      opacity: 0;
      animation: heroSymbolsFade 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .hero-box .symbol:nth-child(1) { animation-delay: 0.5s; }
    .hero-box .symbol:nth-child(2) { animation-delay: 0.55s; }
    .hero-box .symbol:nth-child(3) { animation-delay: 0.6s; }
    .hero-box .symbol:nth-child(4) { animation-delay: 0.65s; }
    .hero-box .symbol:nth-child(5) { animation-delay: 0.7s; }
    .hero-box .symbol:nth-child(6) { animation-delay: 0.75s; }
    .hero-box .symbol:nth-child(7) { animation-delay: 0.8s; }
    .hero-box .symbol:nth-child(8) { animation-delay: 0.85s; }
    .hero-box .symbol:nth-child(9) { animation-delay: 0.9s; }
    .hero-box .symbol:nth-child(10) { animation-delay: 0.95s; }
    .hero-box .symbol:nth-child(11) { animation-delay: 1.0s; }
    .hero-box .symbol:nth-child(12) { animation-delay: 1.05s; }

    .hero-box .symbol:hover {
      color: rgba(34, 255, 136, 0.6);
      transform: scale(1.1);
    }

    /* ============================================================
       GRID (КАРТОЧКИ)
    ============================================================ */
    .grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      flex: 1;
    }

    .card {
      background: linear-gradient(145deg, var(--panel), var(--panel2));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      cursor: pointer;
      transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: visible;
      z-index: 1;
      opacity: 0;
      transform: translateY(30px) scale(0.97);
      animation: cardFadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(34, 255, 136, 0.08);
    }

    .card h3 {
      font-size: clamp(18px, 2.5vw, 24px);
      margin-top: 8px;
    }

    .card p {
      margin-top: 6px;
      color: var(--muted);
      font-size: clamp(12px, 1.2vw, 14px);
      flex: 1;
    }

    .go {
      margin-top: 16px;
      color: var(--accent);
      font-size: clamp(13px, 1.2vw, 15px);
      font-weight: 500;
      transition: 0.3s;
    }

    .card:hover .go {
      transform: translateX(4px);
    }

    /* =============================================================
       11 КЛАСС — ЗОЛОТАЯ ЧЕМПИОНСКАЯ КАРТОЧКА
    ============================================================= */
    .card-gold {
      border: 2px solid rgba(255, 215, 0, 0.5);
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.12), rgba(255, 215, 0, 0.03), rgba(255, 215, 0, 0.12));
      background-size: 300% 300%;
      animation: goldPulse 3s ease-in-out infinite, cardFadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      box-shadow: 0 0 50px rgba(255, 215, 0, 0.08);
      z-index: 2;
      overflow: visible !important;
    }

    .card-gold::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 20px;
      padding: 3px;
      background: conic-gradient(from var(--angle), #ffd700, #ffe066, #ffd700, #b8860b, #ffd700);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: rotateBorder 8s linear infinite;
      z-index: -1;
      pointer-events: none;
    }

    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    @keyframes rotateBorder {
      to { --angle: 360deg; }
    }

    .card-gold:hover {
      transform: translateY(-10px) scale(1.03);
      border-color: #ffd700;
      box-shadow: 0 0 80px rgba(255, 215, 0, 0.35), 0 0 150px rgba(255, 215, 0, 0.15);
    }

    .card-gold .go {
      color: #ffd700;
      text-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
    }

    .gold-deco {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      transition: transform 0.4s ease, filter 0.4s ease;
    }

    .laurel-left-gold {
      top: -12px;
      left: -12px;
      font-size: 44px;
      animation: laurelSway 3.5s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
    }

    .laurel-right-gold {
      top: -12px;
      right: -12px;
      font-size: 44px;
      animation: laurelSway 3.5s ease-in-out infinite reverse;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
    }

    @keyframes laurelSway {
      0%, 100% { transform: rotate(-8deg) scale(1); }
      50% { transform: rotate(8deg) scale(1.08); }
    }

    .trophy-gold {
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 56px;
      animation: trophyFloatGold 3s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
      text-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
      z-index: 6;
    }

    @keyframes trophyFloatGold {
      0%, 100% { transform: translateX(-50%) translateY(0) scale(1) rotate(-3deg); }
      50% { transform: translateX(-50%) translateY(-12px) scale(1.08) rotate(3deg); }
    }

    .ribbon-gold {
      bottom: 10px;
      left: 10px;
      font-size: 28px;
      animation: ribbonWave 4s ease-in-out infinite;
      filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.3));
    }

    @keyframes ribbonWave {
      0%, 100% { transform: rotate(-5deg) scale(1); }
      50% { transform: rotate(5deg) scale(1.1); }
    }

    .sparkle-gold {
      position: absolute;
      font-size: 14px;
      color: #ffd700;
      opacity: 0;
      animation: sparkleFallGold 5s linear infinite;
      pointer-events: none;
      z-index: 4;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
    }

    .sparkle-gold:nth-child(1) { left: 5%; animation-delay: 0s; }
    .sparkle-gold:nth-child(2) { left: 15%; animation-delay: 0.8s; }
    .sparkle-gold:nth-child(3) { left: 25%; animation-delay: 1.6s; }
    .sparkle-gold:nth-child(4) { left: 35%; animation-delay: 0.4s; }
    .sparkle-gold:nth-child(5) { left: 45%; animation-delay: 2.0s; }
    .sparkle-gold:nth-child(6) { left: 55%; animation-delay: 1.2s; }
    .sparkle-gold:nth-child(7) { left: 65%; animation-delay: 2.8s; }
    .sparkle-gold:nth-child(8) { left: 75%; animation-delay: 0.2s; }
    .sparkle-gold:nth-child(9) { left: 85%; animation-delay: 1.0s; }
    .sparkle-gold:nth-child(10) { left: 95%; animation-delay: 2.4s; }

    @keyframes sparkleFallGold {
      0% { opacity: 0; transform: translateY(-30px) scale(0.5) rotate(0deg); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(160px) scale(1.3) rotate(720deg); }
    }

    .card-gold:hover .sparkle-gold {
      animation-duration: 3s;
    }
    .card-gold:hover .trophy-gold {
      animation-duration: 1.5s;
    }
    .card-gold:hover .laurel-left-gold,
    .card-gold:hover .laurel-right-gold {
      animation-duration: 1.8s;
    }

    @keyframes goldPulse {
      0%, 100% { background-position: 0% 50%; box-shadow: 0 0 40px rgba(255, 215, 0, 0.05); }
      50% { background-position: 100% 50%; box-shadow: 0 0 70px rgba(255, 215, 0, 0.15); }
    }

    /* =============================================================
       9 КЛАСС — СЕРЕБРЯНО-СИНЯЯ АКАДЕМИЧЕСКАЯ КАРТОЧКА
    ============================================================= */
    .card-exam {
      border: 2px solid rgba(192, 192, 192, 0.4);
      background: linear-gradient(135deg, rgba(192, 192, 192, 0.08), rgba(26, 42, 74, 0.06), rgba(192, 192, 192, 0.08));
      background-size: 300% 300%;
      animation: examPulse 4s ease-in-out infinite, cardFadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      box-shadow: 0 0 40px rgba(192, 192, 192, 0.04);
      z-index: 2;
      overflow: visible !important;
    }

    .card-exam::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 20px;
      padding: 3px;
      background: conic-gradient(from var(--angle-exam), #c0c0c0, #e8e8e8, #c0c0c0, #a0a0a0, #c0c0c0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: rotateBorderExam 10s linear infinite;
      z-index: -1;
      pointer-events: none;
    }

    @property --angle-exam {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    @keyframes rotateBorderExam {
      to { --angle-exam: 360deg; }
    }

    .card-exam:hover {
      transform: translateY(-10px) scale(1.03);
      border-color: #c0c0c0;
      box-shadow: 0 0 70px rgba(192, 192, 192, 0.25), 0 0 140px rgba(26, 42, 74, 0.15);
    }

    .card-exam .go {
      color: #c0c0c0;
      text-shadow: 0 0 20px rgba(192, 192, 192, 0.3);
    }

    .exam-deco {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      transition: transform 0.4s ease, filter 0.4s ease;
    }

    .cap-exam {
      top: -12px;
      left: -8px;
      font-size: 42px;
      animation: capFloat 5s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(192, 192, 192, 0.4));
    }

    @keyframes capFloat {
      0%, 100% { transform: translateY(0) rotate(-5deg) scale(1); }
      50% { transform: translateY(-10px) rotate(5deg) scale(1.05); }
    }

    .scroll-exam {
      bottom: -8px;
      left: 10px;
      font-size: 32px;
      animation: scrollSway 4s ease-in-out infinite;
      filter: drop-shadow(0 0 15px rgba(192, 192, 192, 0.2));
    }

    @keyframes scrollSway {
      0%, 100% { transform: rotate(-10deg) scale(1); }
      50% { transform: rotate(10deg) scale(1.1); }
    }

    .diploma-exam {
      bottom: -8px;
      right: 10px;
      font-size: 34px;
      animation: diplomaFloat 3.5s ease-in-out infinite;
      filter: drop-shadow(0 0 15px rgba(192, 192, 192, 0.2));
    }

    @keyframes diplomaFloat {
      0%, 100% { transform: translateY(0) rotate(3deg) scale(1); }
      50% { transform: translateY(-6px) rotate(-3deg) scale(1.05); }
    }

    .sparkle-exam {
      position: absolute;
      font-size: 12px;
      color: #c0c0c0;
      opacity: 0;
      animation: sparkleFallExam 6s linear infinite;
      pointer-events: none;
      z-index: 4;
      text-shadow: 0 0 6px rgba(192, 192, 192, 0.4);
    }

    .sparkle-exam:nth-child(1) { left: 8%; animation-delay: 0s; }
    .sparkle-exam:nth-child(2) { left: 20%; animation-delay: 1.0s; }
    .sparkle-exam:nth-child(3) { left: 32%; animation-delay: 2.0s; }
    .sparkle-exam:nth-child(4) { left: 44%; animation-delay: 0.5s; }
    .sparkle-exam:nth-child(5) { left: 56%; animation-delay: 2.5s; }
    .sparkle-exam:nth-child(6) { left: 68%; animation-delay: 1.5s; }
    .sparkle-exam:nth-child(7) { left: 80%; animation-delay: 3.0s; }
    .sparkle-exam:nth-child(8) { left: 92%; animation-delay: 0.3s; }

    @keyframes sparkleFallExam {
      0% { opacity: 0; transform: translateY(-40px) scale(0.4) rotate(0deg); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(180px) scale(1.2) rotate(720deg); }
    }

    .card-exam:hover .sparkle-exam {
      animation-duration: 4s;
    }
    .card-exam:hover .cap-exam {
      animation-duration: 2s;
    }
    .card-exam:hover .scroll-exam,
    .card-exam:hover .diploma-exam {
      animation-duration: 2s;
    }

    @keyframes examPulse {
      0%, 100% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(192, 192, 192, 0.03); }
      50% { background-position: 100% 50%; box-shadow: 0 0 60px rgba(192, 192, 192, 0.12); }
    }

    /* ============================================================
       OVERLAY
    ============================================================ */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s ease;
      z-index: 200;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-panel {
      width: 90%;
      max-width: 400px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      transform: translateY(20px) scale(0.97);
      opacity: 0;
      transition: 0.3s ease;
    }

    .overlay.active .overlay-panel {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .overlay-panel h3 {
      font-size: clamp(20px, 4vw, 28px);
      margin-bottom: 12px;
    }

    .option {
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: 0.25s;
      font-size: clamp(16px, 2vw, 20px);
      text-align: center;
      position: relative;
      overflow: visible;
    }

    .option:hover {
      border-color: var(--accent);
      background: rgba(34, 255, 136, 0.05);
      transform: scale(1.02);
    }

    /* ===== Спецстиль для опции "Геометрия" — синий ===== */
    .option-geometry:hover,
    .option-geometry:active {
      border-color: #4a9eff;
      background: rgba(74, 158, 255, 0.08);
      transform: scale(1.02);
    }

    /* ===== КНОПКА "ЭКЗАМЕН" — фиксированный серебряный стиль ===== */
    .option-exam {
      border: 2px solid rgba(192, 192, 192, 0.6);
      background: linear-gradient(135deg, rgba(192, 192, 192, 0.12), rgba(26, 42, 74, 0.08));
      animation: examPulse 3s ease-in-out infinite, floatButton 5s ease-in-out infinite;
      font-weight: 700;
      color: #c0c0c0;
      padding: 16px 20px;
      font-size: clamp(17px, 2.3vw, 22px);
      letter-spacing: 0.5px;
      text-shadow: 0 0 20px rgba(192, 192, 192, 0.2);
      box-shadow: 0 0 20px rgba(192, 192, 192, 0.08);
      transition: all 0.3s ease;
    }
    .option-exam::before {
      content: "🎓";
      margin-right: 10px;
      display: inline-block;
      animation: capFloat 3s ease-in-out infinite;
    }
    .option-exam::after {
      content: "📜";
      margin-left: 10px;
      display: inline-block;
      animation: scrollSway 3s ease-in-out infinite;
    }
    .option-exam:hover {
      transform: scale(1.06);
      border-color: #c0c0c0;
      background: rgba(192, 192, 192, 0.15);
      box-shadow: 0 0 60px rgba(192, 192, 192, 0.25), 0 0 120px rgba(26, 42, 74, 0.1);
      color: #fff;
      text-shadow: 0 0 30px rgba(192, 192, 192, 0.5);
    }

    /* ===== КНОПКА "ЦЭ / ЦТ" — фиксированный золотой стиль ===== */
    .option-champion-gold {
      border: 2px solid rgba(255, 215, 0, 0.6);
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.12), rgba(255, 215, 0, 0.03));
      animation: goldPulse 2s ease-in-out infinite, floatButton 4s ease-in-out infinite;
      font-weight: 800;
      color: #ffd700;
      padding: 18px 20px;
      font-size: clamp(18px, 2.5vw, 24px);
      letter-spacing: 1px;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
      transition: all 0.3s ease;
    }
    .option-champion-gold::before {
      content: "🏆";
      margin-right: 10px;
      display: inline-block;
      animation: trophyFloatGold 2s ease-in-out infinite;
    }
    .option-champion-gold::after {
      content: "🏁";
      margin-left: 10px;
      display: inline-block;
      animation: floatButton 3s ease-in-out infinite;
    }
    .option-champion-gold .stars {
      display: inline-block;
      margin: 0 6px;
      animation: sparkleFallGold 2s linear infinite;
    }
    .option-champion-gold:hover {
      transform: scale(1.08);
      border-color: #ffd700;
      background: rgba(255, 215, 0, 0.18);
      box-shadow: 0 0 80px rgba(255, 215, 0, 0.35), 0 0 150px rgba(255, 215, 0, 0.1);
      color: #fff;
      text-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: var(--muted);
      font-size: clamp(12px, 1.2vw, 14px);
      border-top: 1px solid var(--border);
      margin-top: 20px;
      opacity: 0;
      animation: fadeInUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.9s;
    }

    /* ============================================================
       АДАПТИВНОСТЬ
    ============================================================ */
    @media (max-width: 900px) {
      .hero { padding: 30px 20px 20px; gap: 20px; }
      .hero-box { width: 220px; height: 200px; }
      .laurel-left-gold, .laurel-right-gold { font-size: 34px; }
      .trophy-gold { font-size: 44px; }
      .cap-exam { font-size: 34px; }
      .scroll-exam, .diploma-exam { font-size: 26px; }
    }

    @media (max-width: 640px) {
      body { padding: 0 16px 30px; }
      header {
        padding: 10px 16px;
        /* убраны отрицательные margin */
      }
      .brand p { font-size: 11px; }
      .page-title { margin-top: 20px; }
      .progress-bar { margin-top: 6px; height: 2px; }
      .grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 12px 0; }
      .card { padding: 14px; overflow: hidden; }
      .overlay-panel { padding: 16px; width: 95%; max-width: 360px; }
      .option { padding: 16px; font-size: 18px; }
      .btn { padding: 14px 28px; width: 100%; max-width: 260px; }
      .buttons { display: flex; justify-content: center; }

      .laurel-left-gold, .laurel-right-gold { font-size: 24px !important; top: -6px; left: -6px; right: -6px; }
      .trophy-gold { font-size: 32px !important; bottom: -8px; }
      .ribbon-gold { font-size: 18px; left: 4px; bottom: 4px; }
      .sparkle-gold { font-size: 10px; }
      .cap-exam { font-size: 24px !important; top: -6px; left: -4px; }
      .scroll-exam, .diploma-exam { font-size: 20px !important; bottom: -4px; }
      .sparkle-exam { font-size: 9px; }
      .card-gold::before, .card-exam::before { display: none; }

      .option-champion-gold { font-size: 16px; padding: 14px; }
      .option-champion-gold::before, .option-champion-gold::after { font-size: 18px; }
      .option-exam { font-size: 15px; padding: 14px; }
      .option-exam::before, .option-exam::after { font-size: 18px; }
    }

    @media (max-width: 400px) {
      .hero-content h1 { font-size: 28px; }
      .hero-box { height: 150px; gap: 4px; }
      .grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .card h3 { font-size: 16px; }
    }

    /* ============================================================
       ВСПОМОГАТЕЛЬНЫЕ АНИМАЦИИ
    ============================================================ */
    @keyframes rotateBorder { to { --angle: 360deg; } }
    @keyframes rotateBorderExam { to { --angle-exam: 360deg; } }
    @keyframes laurelSway { 0%,100% { transform: rotate(-8deg) scale(1); } 50% { transform: rotate(8deg) scale(1.08); } }
    @keyframes trophyFloatGold { 0%,100% { transform: translateX(-50%) translateY(0) scale(1) rotate(-3deg); } 50% { transform: translateX(-50%) translateY(-12px) scale(1.08) rotate(3deg); } }
    @keyframes ribbonWave { 0%,100% { transform: rotate(-5deg) scale(1); } 50% { transform: rotate(5deg) scale(1.1); } }
    @keyframes sparkleFallGold { 0% { opacity:0; transform:translateY(-30px) scale(0.5) rotate(0deg); } 10%{opacity:1;} 90%{opacity:1;} 100%{opacity:0; transform:translateY(160px) scale(1.3) rotate(720deg); } }
    @keyframes goldPulse { 0%,100% { background-position: 0% 50%; box-shadow:0 0 40px rgba(255,215,0,0.05); } 50% { background-position: 100% 50%; box-shadow:0 0 70px rgba(255,215,0,0.15); } }
    @keyframes capFloat { 0%,100% { transform: translateY(0) rotate(-5deg) scale(1); } 50% { transform: translateY(-10px) rotate(5deg) scale(1.05); } }
    @keyframes scrollSway { 0%,100% { transform: rotate(-10deg) scale(1); } 50% { transform: rotate(10deg) scale(1.1); } }
    @keyframes diplomaFloat { 0%,100% { transform: translateY(0) rotate(3deg) scale(1); } 50% { transform: translateY(-6px) rotate(-3deg) scale(1.05); } }
    @keyframes sparkleFallExam { 0% { opacity:0; transform:translateY(-40px) scale(0.4) rotate(0deg); } 10%{opacity:1;} 90%{opacity:1;} 100%{opacity:0; transform:translateY(180px) scale(1.2) rotate(720deg); } }
    @keyframes examPulse { 0%,100% { background-position: 0% 50%; box-shadow:0 0 30px rgba(192,192,192,0.03); } 50% { background-position: 100% 50%; box-shadow:0 0 60px rgba(192,192,192,0.12); } }
    @keyframes floatButton { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  </style>
</head>

<body>

  <header>
    <div class="brand">
      <h1>EPALLAXIS <span>math</span></h1>
      <p>Ἐπαλλάσσω — приводить систему в порядок</p>
    </div>
    <!-- Переключатель тем удалён -->
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>МАТЕМАТИКА<br><span>5–11 КЛАССЫ</span></h1>
      <p>Структурированная система обучения: теория, практика, экзамены.</p>
      <div class="buttons">
        <div class="btn" onclick="scrollToClasses()">Выбрать класс</div>
      </div>
    </div>

    <div class="hero-box" id="staticBox">
      <div class="symbol">√</div>
      <div class="symbol">∑</div>
      <div class="symbol">π</div>
      <div class="symbol">∫</div>
      <div class="symbol">∞</div>
      <div class="symbol">x²</div>
      <div class="symbol">a</div>
      <div class="symbol">b</div>
      <div class="symbol">c</div>
      <div class="symbol">∠</div>
      <div class="symbol">α</div>
      <div class="symbol">β</div>
    </div>
  </section>

  <section class="grid" id="grid"></section>

  <footer>
    EPALLAXIS — Mathematics System 2026
  </footer>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <h3 id="overlayTitle">Выбор</h3>
      <div id="optionsContainer"></div>
    </div>
  </div>

  <script>
    // ================================================================
    // 1. ПЛАВНЫЙ ПЕРЕХОД МЕЖДУ СТРАНИЦАМИ
    // ================================================================
    document.addEventListener('click', function(e) {
      const link = e.target.closest('a');
      if (link && link.href && link.href.indexOf(window.location.origin) === 0 && !link.target && link.getAttribute('href') !== '#') {
        if (link.classList.contains('btn') || link.classList.contains('theme-dot')) return;
        e.preventDefault();
        document.body.style.opacity = '0';
        document.body.style.transition = 'opacity 0.5s ease';
        setTimeout(() => {
          window.location.href = link.href;
        }, 500);
      }
    });

    window.addEventListener('load', function() {
      document.body.style.opacity = '1';
    });

    // ================================================================
    // 2. ГЕНЕРАЦИЯ КАРТОЧЕК И ОВЕРЛЕЙ
    // ================================================================
    const classes = [5, 6, 7, 8, 9, 10, 11];
    const grid = document.getElementById('grid');
    const overlay = document.getElementById('overlay');
    const optionsContainer = document.getElementById('optionsContainer');
    const overlayTitle = document.getElementById('overlayTitle');

    classes.forEach((n, index) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${0.4 + index * 0.08}s`;

      if (n === 11) {
        card.classList.add('card-gold');
        card.innerHTML = `
          <span class="gold-deco laurel-left-gold">🌿</span>
          <span class="gold-deco laurel-right-gold">🌿</span>
          <span class="gold-deco trophy-gold">🏆</span>
          <span class="gold-deco ribbon-gold">🎗️</span>
          <span class="sparkle-gold">✦</span><span class="sparkle-gold">✦</span>
          <span class="sparkle-gold">✦</span><span class="sparkle-gold">✦</span>
          <span class="sparkle-gold">✦</span><span class="sparkle-gold">✦</span>
          <span class="sparkle-gold">✦</span><span class="sparkle-gold">✦</span>
          <span class="sparkle-gold">✦</span><span class="sparkle-gold">✦</span>
          <h3>${n} класс</h3>
          <p>Чемпионский выпуск!</p>
          <div class="go">перейти →</div>
        `;
      } else if (n === 9) {
        card.classList.add('card-exam');
        card.innerHTML = `
          <span class="exam-deco cap-exam">🎓</span>
          <span class="exam-deco scroll-exam">📜</span>
          <span class="exam-deco diploma-exam">📄</span>
          <span class="sparkle-exam">✦</span><span class="sparkle-exam">✦</span>
          <span class="sparkle-exam">✦</span><span class="sparkle-exam">✦</span>
          <span class="sparkle-exam">✦</span><span class="sparkle-exam">✦</span>
          <span class="sparkle-exam">✦</span><span class="sparkle-exam">✦</span>
          <h3>${n} класс</h3>
          <p>Экзаменационный выпуск</p>
          <div class="go">перейти →</div>
        `;
      } else {
        card.innerHTML = `
          <h3>${n} класс</h3>
          <p>Базовая структура обучения</p>
          <div class="go">перейти →</div>
        `;
      }

      card.addEventListener('click', () => openClass(n));
      grid.appendChild(card);
    });

    function openClass(n) {
      if (n === 5) {
        window.location.href = 'class5/class5.html';
        return;
      }
      if (n === 6) {
        window.location.href = 'class6/class6.html';
        return;
      }

      overlay.classList.add('active');
      optionsContainer.innerHTML = '';
      overlayTitle.textContent = `${n} класс`;

      let items = [];
      if (n === 7 || n === 8) items = ['Алгебра', 'Геометрия'];
      else if (n === 9) items = ['Алгебра', 'Геометрия', 'Экзамен'];
      else if (n === 10) items = ['Алгебра', 'Геометрия'];
      else if (n === 11) items = ['Алгебра', 'Геометрия', 'ЦЭ / ЦТ'];

      const pathMap = {
        7: {
          'Алгебра': 'class7/algebra/class7alg.html',
          'Геометрия': 'class7/geometry/class7geom.html'
        },
        8: {
          'Алгебра': 'class8/algebra/class8alg.html',
          'Геометрия': 'class8/geometry/class8geom.html'
        },
        9: {
          'Алгебра': 'class9/algebra/class9alg.html',
          'Геометрия': 'class9/geometry/class9geom.html',
          'Экзамен': 'class9/exam/exam.html'
        },
        10: {
          'Алгебра': 'class10/algebra/class10alg.html',
          'Геометрия': 'class10/geometry/class10geom.html'
        },
        11: {
          'Алгебра': 'class11/algebra/class11alg.html',
          'Геометрия': 'class11/geometry/class11geom.html',
          'ЦЭ / ЦТ': 'class11/CTandCE/CTandCE.html'
        }
      };

      items.forEach(item => {
        const option = document.createElement('div');
        option.className = 'option';

        // Для "Геометрия" добавляем специальный класс для синего свечения
        if (item === 'Геометрия') {
          option.classList.add('option-geometry');
        }

        if (n === 11 && item === 'ЦЭ / ЦТ') {
          option.classList.add('option-champion-gold');
          option.innerHTML = `<span class="stars">✧</span> ${item} <span class="stars">✧</span>`;
        } else if (n === 9 && item === 'Экзамен') {
          option.classList.add('option-exam');
          option.textContent = item;
        } else {
          option.textContent = item;
        }

        option.addEventListener('click', () => {
          overlay.classList.remove('active');
          const path = pathMap[n]?.[item];
          if (path) {
            window.location.href = path;
          } else {
            alert(`Страница для ${n} класса, предмет "${item}" ещё не создана.`);
          }
        });

        optionsContainer.appendChild(option);
      });
    }

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        overlay.classList.remove('active');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('active')) {
        overlay.classList.remove('active');
      }
    });

    function scrollToClasses() {
      document.getElementById('grid').scrollIntoView({ behavior: 'smooth' });
    }
  </script>

</body>
</html>
