<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathMaster — занятия по математике</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />
    <style>
        /* ——— Reset & Base ——— */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0b0e17;
            --bg-card: rgba(255, 255, 255, 0.05);
            --bg-card-hover: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(255, 215, 0, 0.25);
            --gold: #f5c842;
            --gold-light: #ffe074;
            --gold-gradient: linear-gradient(135deg, #f5c842 0%, #d4a02b 100%);
            --text-primary: #f0f2f5;
            --text-secondary: #a8b2c8;
            --text-muted: #6a7a94;
            --shadow-card: 0 25px 60px -15px rgba(0, 0, 0, 0.8);
            --radius: 24px;
            --radius-sm: 14px;
            --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(245, 200, 66, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(245, 200, 66, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(100, 80, 255, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* ——— Glassmorphism Container ——— */
        .app-wrapper {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(18px) saturate(1.2);
            -webkit-backdrop-filter: blur(18px) saturate(1.2);
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            padding: 2.2rem 2.5rem 2.8rem;
            position: relative;
            overflow: hidden;
        }

        .app-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 30%, rgba(245, 200, 66, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ——— Header ——— */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.2rem;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            gap: 0.8rem 1.2rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            background: var(--gold-gradient);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 800;
            color: #0b0e17;
            box-shadow: 0 8px 24px rgba(245, 200, 66, 0.25);
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.6rem;
            line-height: 1.1;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .brand-sub {
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--text-secondary);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            -webkit-text-fill-color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            letter-spacing: 0.01em;
            position: relative;
            z-index: 1;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: var(--gold-gradient);
            color: #0b0e17;
            border: none;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(245, 200, 66, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 32px rgba(245, 200, 66, 0.4);
            background: linear-gradient(135deg, #ffe074 0%, #d4a02b 100%);
            color: #0b0e17;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* ——— Stats Bar ——— */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            margin-bottom: 2.2rem;
            position: relative;
            z-index: 1;
        }

        .stat-item {
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 0.8rem 0.6rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            transition: var(--transition);
        }

        .stat-item:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .stat-number.gold {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-number.green {
            color: #4ade80;
        }

        .stat-number.red {
            color: #f87171;
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-top: 0.1rem;
            font-weight: 500;
        }

        /* ——— Task Card ——— */
        .task-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 2rem 2.2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
            margin-bottom: 1.8rem;
            position: relative;
            z-index: 1;
            transition: var(--transition);
            min-height: 180px;
            display: flex;
            flex-direction: column;
        }

        .task-card:hover {
            border-color: rgba(255, 255, 255, 0.08);
            background: var(--bg-card-hover);
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .task-badge {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.25rem 0.9rem;
            border-radius: 60px;
            background: rgba(245, 200, 66, 0.12);
            color: var(--gold);
            border: 1px solid rgba(245, 200, 66, 0.15);
        }

        .task-id {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .task-question {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.5;
            color: var(--text-primary);
            margin-bottom: 0.6rem;
            flex: 1;
            display: flex;
            align-items: center;
        }

        .task-question .math {
            font-family: 'Times New Roman', serif;
            font-style: italic;
            font-weight: 700;
            font-size: 1.7rem;
            color: var(--gold-light);
            margin: 0 0.2rem;
        }

        .task-hint {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 0.8rem;
            font-weight: 400;
        }

        .task-hint span {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-right: 0.4rem;
        }

        /* ——— Answer Area ——— */
        .answer-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem;
            position: relative;
            z-index: 1;
            margin-top: 0.4rem;
        }

        .answer-input-wrap {
            flex: 2;
            min-width: 200px;
            position: relative;
        }

        .answer-input {
            width: 100%;
            padding: 0.9rem 1.4rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            backdrop-filter: blur(4px);
            outline: none;
        }

        .answer-input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.95rem;
        }

        .answer-input:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 4px rgba(245, 200, 66, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .answer-input.correct {
            border-color: #4ade80;
            background: rgba(74, 222, 128, 0.06);
            box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.08);
        }

        .answer-input.wrong {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.06);
            box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.08);
        }

        .answer-actions {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-check {
            padding: 0.9rem 2rem;
            min-width: 120px;
            font-size: 0.95rem;
        }

        .btn-next {
            padding: 0.9rem 1.8rem;
            font-size: 0.95rem;
        }

        .feedback-message {
            width: 100%;
            margin-top: 0.8rem;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            min-height: 3rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            transition: var(--transition);
        }

        .feedback-message.success {
            color: #4ade80;
            border-color: rgba(74, 222, 128, 0.15);
            background: rgba(74, 222, 128, 0.04);
        }

        .feedback-message.error {
            color: #f87171;
            border-color: rgba(248, 113, 113, 0.15);
            background: rgba(248, 113, 113, 0.04);
        }

        .feedback-message.info {
            color: var(--text-secondary);
            border-color: rgba(255, 255, 255, 0.04);
        }

        .feedback-message .icon {
            font-size: 1.2rem;
        }

        /* ——— Teacher Panel ——— */
        .teacher-panel {
            margin-top: 2rem;
            padding-top: 1.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
            z-index: 1;
            display: none;
            animation: fadeSlide 0.4s ease;
        }

        .teacher-panel.open {
            display: block;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .teacher-panel h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .teacher-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .form-row .field {
            flex: 1;
            min-width: 160px;
        }

        .form-row .field label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .form-row .field input,
        .form-row .field textarea {
            width: 100%;
            padding: 0.6rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: var(--transition);
            outline: none;
            resize: vertical;
        }

        .form-row .field textarea {
            min-height: 60px;
            resize: vertical;
        }

        .form-row .field input:focus,
        .form-row .field textarea:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 3px rgba(245, 200, 66, 0.05);
        }

        .form-row .field input::placeholder,
        .form-row .field textarea::placeholder {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.85rem;
        }

        .teacher-actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 0.4rem;
        }

        /* ——— Responsive ——— */
        @media (max-width: 700px) {
            .app-wrapper {
                padding: 1.5rem 1.2rem 2rem;
                border-radius: 20px;
            }

            .brand-name {
                font-size: 1.3rem;
            }
            .brand-icon {
                width: 40px;
                height: 40px;
                font-size: 1.3rem;
            }

            .task-question {
                font-size: 1.2rem;
            }

            .task-card {
                padding: 1.4rem 1.2rem;
            }

            .stats-bar {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.5rem;
            }
            .stat-number {
                font-size: 1.4rem;
            }

            .answer-area {
                flex-direction: column;
                align-items: stretch;
            }

            .answer-input-wrap {
                min-width: unset;
            }

            .answer-actions {
                justify-content: stretch;
            }

            .answer-actions .btn {
                flex: 1;
                justify-content: center;
            }

            .btn-check,
            .btn-next {
                min-width: unset;
                padding: 0.8rem 1.2rem;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-actions {
                width: 100%;
                justify-content: flex-start;
            }

            .form-row {
                flex-direction: column;
            }
            .form-row .field {
                min-width: unset;
            }
        }

        @media (max-width: 450px) {
            .stats-bar {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 0.4rem;
            }
            .stat-item {
                padding: 0.5rem 0.3rem;
            }
            .stat-number {
                font-size: 1.2rem;
            }
            .stat-label {
                font-size: 0.55rem;
            }
            .task-question {
                font-size: 1rem;
            }
            .brand-name {
                font-size: 1.1rem;
            }
        }

        /* ——— Scrollbar ——— */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(245, 200, 66, 0.25);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(245, 200, 66, 0.4);
        }

        /* ——— Utilities ——— */
        .hidden {
            display: none !important;
        }
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gap-1 {
            gap: 0.5rem;
        }
        .text-gold {
            color: var(--gold);
        }
        .mt-1 {
            margin-top: 0.5rem;
        }
        .mb-1 {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="app-wrapper" role="main">

        <!-- ===== HEADER ===== -->
        <header class="header">
            <div class="brand">
                <div class="brand-icon">∑</div>
                <div class="brand-text">
                    <span class="brand-name">MathMaster</span>
                    <span class="brand-sub">Интерактивные занятия</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" id="toggleTeacherBtn" aria-label="Панель учителя">
                    <span>✏️</span> Учитель
                </button>
                <button class="btn btn-secondary" id="resetStatsBtn" aria-label="Сбросить статистику">
                    <span>↻</span> Сброс
                </button>
            </div>
        </header>

        <!-- ===== STATS ===== -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number gold" id="totalCount">0</div>
                <div class="stat-label">Всего заданий</div>
            </div>
            <div class="stat-item">
                <div class="stat-number green" id="correctCount">0</div>
                <div class="stat-label">Верно</div>
            </div>
            <div class="stat-item">
                <div class="stat-number red" id="wrongCount">0</div>
                <div class="stat-label">Неверно</div>
            </div>
        </div>

        <!-- ===== TASK CARD ===== -->
        <div class="task-card" id="taskCard">
            <div class="task-meta">
                <span class="task-badge" id="taskBadge">Задание</span>
                <span class="task-id" id="taskId">#1</span>
            </div>
            <div class="task-question" id="taskQuestion">
                <span>Решите пример: </span>
                <span class="math">7 + 3 = ?</span>
            </div>
            <div class="task-hint" id="taskHint">
                <span>💡</span> Введите числовой ответ
            </div>
        </div>

        <!-- ===== ANSWER AREA ===== -->
        <div class="answer-area">
            <div class="answer-input-wrap">
                <input type="text" class="answer-input" id="answerInput" placeholder="Введите ответ..." autofocus />
            </div>
            <div class="answer-actions">
                <button class="btn btn-primary btn-check" id="checkBtn">✓ Проверить</button>
                <button class="btn btn-secondary btn-next" id="nextBtn">→ Следующее</button>
            </div>
            <div class="feedback-message info" id="feedbackMessage">
                <span class="icon">ℹ️</span>
                <span id="feedbackText">Введите ответ и нажмите «Проверить»</span>
            </div>
        </div>

        <!-- ===== TEACHER PANEL ===== -->
        <div class="teacher-panel" id="teacherPanel">
            <h3>✏️ Панель учителя — добавить задание</h3>
            <div class="teacher-form">
                <div class="form-row">
                    <div class="field">
                        <label for="taskQuestionInput">Условие задачи</label>
                        <input type="text" id="taskQuestionInput" placeholder="Например: 12 + 8 = ?" />
                    </div>
                    <div class="field">
                        <label for="taskAnswerInput">Правильный ответ</label>
                        <input type="text" id="taskAnswerInput" placeholder="Например: 20" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="field">
                        <label for="taskHintInput">Подсказка (необязательно)</label>
                        <input type="text" id="taskHintInput" placeholder="Краткая подсказка..." />
                    </div>
                    <div class="field" style="flex:0.6;min-width:120px;">
                        <label for="taskTypeInput">Тип</label>
                        <input type="text" id="taskTypeInput" placeholder="Пример / Уравнение" />
                    </div>
                </div>
                <div class="teacher-actions">
                    <button class="btn btn-primary" id="addTaskBtn">➕ Добавить задание</button>
                    <button class="btn btn-secondary" id="resetTasksBtn">🔄 Сбросить все задания</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        (function() {
            'use strict';

            // ——— Data ———
            const defaultTasks = [{
                question: 'Решите пример: <span class="math">7 + 3 = ?</span>',
                answer: '10',
                hint: 'Сложите числа',
                type: 'Пример'
            }, {
                question: 'Решите пример: <span class="math">15 − 8 = ?</span>',
                answer: '7',
                hint: 'Вычтите 8 из 15',
                type: 'Пример'
            }, {
                question: 'Решите уравнение: <span class="math">x + 5 = 12</span>, найдите <span class="math">x</span>',
                answer: '7',
                hint: 'Перенесите 5 в правую часть',
                type: 'Уравнение'
            }, {
                question: 'Сколько будет <span class="math">6 × 7 = ?</span>',
                answer: '42',
                hint: 'Таблица умножения',
                type: 'Пример'
            }, {
                question: 'Разделите: <span class="math">72 ÷ 8 = ?</span>',
                answer: '9',
                hint: 'Вспомните таблицу деления',
                type: 'Пример'
            }, {
                question: 'Найдите периметр квадрата со стороной <span class="math">4</span> см',
                answer: '16',
                hint: 'P = 4 × a',
                type: 'Геометрия'
            }];

            // ——— State ———
            let tasks = [];
            let currentIndex = 0;
            let stats = { total: 0, correct: 0, wrong: 0 };
            let answered = false;
            let lastAnswer = '';

            // ——— DOM refs ———
            const taskQuestion = document.getElementById('taskQuestion');
            const taskBadge = document.getElementById('taskBadge');
            const taskId = document.getElementById('taskId');
            const taskHint = document.getElementById('taskHint');
            const answerInput = document.getElementById('answerInput');
            const checkBtn = document.getElementById('checkBtn');
            const nextBtn = document.getElementById('nextBtn');
            const feedbackText = document.getElementById('feedbackText');
            const feedbackMessage = document.getElementById('feedbackMessage');
            const totalCount = document.getElementById('totalCount');
            const correctCount = document.getElementById('correctCount');
            const wrongCount = document.getElementById('wrongCount');
            const toggleTeacherBtn = document.getElementById('toggleTeacherBtn');
            const teacherPanel = document.getElementById('teacherPanel');
            const taskQuestionInput = document.getElementById('taskQuestionInput');
            const taskAnswerInput = document.getElementById('taskAnswerInput');
            const taskHintInput = document.getElementById('taskHintInput');
            const taskTypeInput = document.getElementById('taskTypeInput');
            const addTaskBtn = document.getElementById('addTaskBtn');
            const resetTasksBtn = document.getElementById('resetTasksBtn');
            const resetStatsBtn = document.getElementById('resetStatsBtn');

            // ——— Helpers ———
            function normalizeAnswer(str) {
                return str.trim().toLowerCase().replace(/\s+/g, ' ');
            }

            function updateStatsUI() {
                totalCount.textContent = stats.total;
                correctCount.textContent = stats.correct;
                wrongCount.textContent = stats.wrong;
            }

            function saveState() {
                try {
                    localStorage.setItem('mathmaster_tasks', JSON.stringify(tasks));
                    localStorage.setItem('mathmaster_stats', JSON.stringify(stats));
                    localStorage.setItem('mathmaster_index', String(currentIndex));
                } catch (_) { /* ignore */ }
            }

            function loadState() {
                try {
                    const t = localStorage.getItem('mathmaster_tasks');
                    const s = localStorage.getItem('mathmaster_stats');
                    const i = localStorage.getItem('mathmaster_index');
                    if (t) tasks = JSON.parse(t);
                    if (s) stats = JSON.parse(s);
                    if (i) currentIndex = parseInt(i, 10) || 0;
                } catch (_) { /* ignore */ }
            }

            // ——— Render ———
            function renderTask() {
                if (!tasks.length) {
                    // fallback
                    tasks = JSON.parse(JSON.stringify(defaultTasks));
                    stats = { total: 0, correct: 0, wrong: 0 };
                    currentIndex = 0;
                    saveState();
                }

                if (currentIndex >= tasks.length) currentIndex = 0;
                const task = tasks[currentIndex];
                if (!task) return;

                taskQuestion.innerHTML = task.question || 'Задание не задано';
                taskBadge.textContent = task.type || 'Задание';
                taskId.textContent = `#${currentIndex + 1}`;
                taskHint.innerHTML = task.hint ?
                    `<span>💡</span> ${task.hint}` :
                    `<span>💡</span> Введите числовой ответ`;

                answerInput.value = '';
                answerInput.className = 'answer-input';
                answerInput.focus();
                feedbackMessage.className = 'feedback-message info';
                feedbackText.textContent = 'Введите ответ и нажмите «Проверить»';
                answered = false;
                lastAnswer = '';

                // update stats total if not set
                if (stats.total < tasks.length) {
                    stats.total = tasks.length;
                    updateStatsUI();
                    saveState();
                }
            }

            // ——— Check answer ———
            function handleCheck() {
                if (!tasks.length) return;
                const task = tasks[currentIndex];
                if (!task) return;

                const userAnswer = answerInput.value.trim();
                if (userAnswer === '') {
                    feedbackMessage.className = 'feedback-message info';
                    feedbackText.textContent = '✏️ Введите ответ перед проверкой';
                    return;
                }

                if (answered) {
                    feedbackMessage.className = 'feedback-message info';
                    feedbackText.textContent = '⏳ Это задание уже проверено. Нажмите «Следующее»';
                    return;
                }

                const normalizedUser = normalizeAnswer(userAnswer);
                const normalizedCorrect = normalizeAnswer(task.answer);

                const isCorrect = normalizedUser === normalizedCorrect;

                if (isCorrect) {
                    answerInput.className = 'answer-input correct';
                    feedbackMessage.className = 'feedback-message success';
                    feedbackText.innerHTML = '✅ <strong>Верно!</strong> Отличная работа! 🎉';
                    stats.correct += 1;
                } else {
                    answerInput.className = 'answer-input wrong';
                    feedbackMessage.className = 'feedback-message error';
                    feedbackText.innerHTML =
                        `❌ <strong>Неверно.</strong> Правильный ответ: <strong>${task.answer}</strong>`;
                    stats.wrong += 1;
                }

                stats.total = tasks.length;
                answered = true;
                lastAnswer = userAnswer;
                updateStatsUI();
                saveState();
            }

            // ——— Next task ———
            function handleNext() {
                if (!tasks.length) return;
                if (!answered) {
                    // если не отвечено, но можно перейти — предупредим
                    if (answerInput.value.trim() !== '') {
                        if (!confirm('Вы ещё не проверили ответ. Перейти к следующему заданию?')) return;
                    }
                }
                currentIndex = (currentIndex + 1) % tasks.length;
                renderTask();
                saveState();
            }

            // ——— Add task (teacher) ———
            function addTask() {
                const q = taskQuestionInput.value.trim();
                const a = taskAnswerInput.value.trim();
                if (!q || !a) {
                    alert('Пожалуйста, заполните условие и правильный ответ.');
                    return;
                }

                const hint = taskHintInput.value.trim() || 'Без подсказки';
                const type = taskTypeInput.value.trim() || 'Задание';

                tasks.push({
                    question: q,
                    answer: a,
                    hint: hint,
                    type: type
                });

                // обновим статистику
                stats.total = tasks.length;
                // если мы на последнем задании, остаёмся, иначе переходим на новое
                if (currentIndex === tasks.length - 2) {
                    // только что добавили, переключаем на новое
                    currentIndex = tasks.length - 1;
                }
                renderTask();
                updateStatsUI();
                saveState();

                // очистим поля
                taskQuestionInput.value = '';
                taskAnswerInput.value = '';
                taskHintInput.value = '';
                taskTypeInput.value = '';

                feedbackMessage.className = 'feedback-message success';
                feedbackText.textContent = '✅ Задание добавлено!';
                setTimeout(() => {
                    if (!answered) {
                        feedbackMessage.className = 'feedback-message info';
                        feedbackText.textContent = 'Введите ответ и нажмите «Проверить»';
                    }
                }, 2000);
            }

            // ——— Reset tasks ———
            function resetTasks() {
                if (!confirm('Сбросить все задания к начальному набору?')) return;
                tasks = JSON.parse(JSON.stringify(defaultTasks));
                stats = { total: tasks.length, correct: 0, wrong: 0 };
                currentIndex = 0;
                renderTask();
                updateStatsUI();
                saveState();
                feedbackMessage.className = 'feedback-message info';
                feedbackText.textContent = '🔄 Задания сброшены к стандартному набору.';
            }

            // ——— Reset stats ———
            function resetStats() {
                if (!confirm('Сбросить статистику (правильные/неправильные)?')) return;
                stats.correct = 0;
                stats.wrong = 0;
                stats.total = tasks.length;
                updateStatsUI();
                saveState();
                feedbackMessage.className = 'feedback-message info';
                feedbackText.textContent = '📊 Статистика сброшена.';
                // сбросим стиль поля
                answerInput.className = 'answer-input';
                answered = false;
            }

            // ——— Toggle teacher panel ———
            function toggleTeacher() {
                teacherPanel.classList.toggle('open');
                const isOpen = teacherPanel.classList.contains('open');
                toggleTeacherBtn.innerHTML = isOpen ? '🔒 Закрыть' : '✏️ Учитель';
            }

            // ——— Keyboard shortcuts ———
            function onKeydown(e) {
                if (e.key === 'Enter') {
                    if (document.activeElement === answerInput) {
                        e.preventDefault();
                        if (!answered) {
                            handleCheck();
                        } else {
                            handleNext();
                        }
                    }
                }
            }

            // ——— Init ———
            function init() {
                loadState();

                if (!tasks || !tasks.length) {
                    tasks = JSON.parse(JSON.stringify(defaultTasks));
                    stats = { total: tasks.length, correct: 0, wrong: 0 };
                    currentIndex = 0;
                } else {
                    // ensure stats.total matches tasks length
                    stats.total = tasks.length;
                }

                renderTask();
                updateStatsUI();
                saveState();

                // Events
                checkBtn.addEventListener('click', handleCheck);
                nextBtn.addEventListener('click', handleNext);
                addTaskBtn.addEventListener('click', addTask);
                resetTasksBtn.addEventListener('click', resetTasks);
                resetStatsBtn.addEventListener('click', resetStats);
                toggleTeacherBtn.addEventListener('click', toggleTeacher);
                document.addEventListener('keydown', onKeydown);

                // если нажать Enter в поле ввода при открытой панели учителя — не триггерим
                answerInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') e.stopPropagation();
                });

                // клик на задание — фокус на инпут
                document.getElementById('taskCard').addEventListener('click', () => {
                    answerInput.focus();
                });

                // автофокус
                setTimeout(() => answerInput.focus(), 300);
            }

            // Запуск
            init();

        })();
    </script>

</body>
</html>
