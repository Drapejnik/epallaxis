<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Алгебра 9 класс — EPALLAXIS</title>

  <style>
    /* ===== Переменные темы ===== */
    :root {
      --bg: #060a10;
      --panel: #0f1720;
      --panel2: #111c26;
      --text: #e8f0ea;
      --muted: #9aa4b2;
      --accent: #22ff88;
      --border: rgba(34, 255, 136, 0.18);
    }

    body.theme-orange {
      --bg: #0a0a06;
      --panel: #1a180f;
      --panel2: #262018;
      --text: #f5ede4;
      --muted: #c4b8a8;
      --accent: #ff8c42;
      --border: rgba(255, 140, 66, 0.25);
    }

    body.theme-purple {
      --bg: #0a0616;
      --panel: #1a1028;
      --panel2: #241838;
      --text: #f0eaff;
      --muted: #b8aad4;
      --accent: #aa66ff;
      --border: rgba(170, 102, 255, 0.25);
    }

    body.theme-blue {
      --bg: #060a1a;
      --panel: #0f1a2a;
      --panel2: #182838;
      --text: #e8eeff;
      --muted: #aab8d4;
      --accent: #4a9eff;
      --border: rgba(74, 158, 255, 0.25);
    }

    /* ===== Плавные переходы ===== */
    * {
      transition: background 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                  border-color 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                  color 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ===== Базовые стили ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    }

    body {
      background: radial-gradient(1200px 600px at 20% 0%, #0d1f18 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 20px 40px;
      transition: background 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
    }
    body.theme-orange { background: radial-gradient(1200px 600px at 20% 0%, #2a1f0d 0%, var(--bg) 60%); }
    body.theme-purple { background: radial-gradient(1200px 600px at 20% 0%, #1a0d2a 0%, var(--bg) 60%); }
    body.theme-blue { background: radial-gradient(1200px 600px at 20% 0%, #0d1a2a 0%, var(--bg) 60%); }

    /* ============================================================
       ИДЕЯ 4: «Дышащие» фоновые символы
    ============================================================ */
    .bg-symbols {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-symbols span {
      position: absolute;
      color: rgba(255,255,255,0.03);
      font-size: 80px;
      font-weight: 700;
      font-family: 'Georgia', serif;
      user-select: none;
      animation: breathe 8s ease-in-out infinite;
      opacity: 0.3;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.02; transform: scale(1); }
      50% { opacity: 0.08; transform: scale(1.05); }
    }

    /* ============================================================
       HEADER + ИДЕЯ 1: ПРОГРЕСС-БАР (всегда виден)
    ============================================================ */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6, 10, 16, 0.75);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 10px;
      display: flex;
      flex-direction: column;
      transition: background 0.5s, border-color 0.5s;
      margin: 0 -20px 0;
      padding-left: 20px;
      padding-right: 20px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand h1 {
      font-size: clamp(20px, 4vw, 28px);
      letter-spacing: 2px;
      line-height: 1.1;
    }

    .brand h1 span {
      color: var(--accent);
      transition: color 0.5s;
    }

    .brand p {
      font-size: clamp(11px, 1.5vw, 14px);
      color: var(--muted);
      margin-top: 2px;
      transition: color 0.5s;
    }

    /* Прогресс-бар в шапке (тонкая линия) */
    .progress-bar {
      width: 100%;
      height: 2px;
      background: var(--border);
      border-radius: 4px;
      margin-top: 10px;
      overflow: hidden;
      transition: background 0.5s;
    }
    .progress-bar .fill {
      width: 0%;
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.15s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 0 12px var(--accent);
    }

    /* ============================================================
       ЗАГОЛОВОК СТРАНИЦЫ (без прогресс-бара, он в шапке)
    ============================================================ */
    .page-title {
      max-width: 1100px;
      margin: 30px auto 10px;
      width: 100%;
      text-align: left;
      position: relative;
      z-index: 2;
    }

    .page-title h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .page-title h1 span {
      color: var(--accent);
      transition: color 0.5s;
    }

    .page-title p {
      color: var(--muted);
      font-size: clamp(14px, 1.5vw, 18px);
      margin-top: 6px;
      transition: color 0.5s;
    }

    /* ============================================================
       ИДЕЯ 5: СВЕТОВОЙ БЛИК НА КАРТОЧКЕ
    ============================================================ */
    .topic-card {
      background: linear-gradient(145deg, var(--panel), var(--panel2));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px 20px 18px;
      cursor: pointer;
      transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), background 0.5s, border-color 0.5s, box-shadow 0.5s;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: cardReveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    /* Световой блик */
    .topic-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 200%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04) 50%, transparent);
      transform: skewX(-25deg);
      transition: left 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }
    .topic-card:hover::before,
    .topic-card:active::before {
      left: 100%;
    }

    /* ИДЕЯ 3: Анимация появления с вращением */
    @keyframes cardReveal {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.95) rotate(-2deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
      }
    }

    .topic-card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: var(--accent);
      box-shadow: 0 8px 40px rgba(34, 255, 136, 0.08);
    }
    body.theme-orange .topic-card:hover { box-shadow: 0 8px 40px rgba(255, 140, 66, 0.12); }
    body.theme-purple .topic-card:hover { box-shadow: 0 8px 40px rgba(170, 102, 255, 0.12); }
    body.theme-blue .topic-card:hover { box-shadow: 0 8px 40px rgba(74, 158, 255, 0.12); }

    /* ============================================================
       ИДЕЯ 2: ИНТЕРАКТИВНЫЙ НОМЕР ТЕМЫ
    ============================================================ */
    .topic-number {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      display: inline-block;
      width: fit-content;
    }
    .topic-card:hover .topic-number,
    .topic-card:active .topic-number {
      font-size: 20px;
      color: var(--accent);
      transform: translateX(4px);
      text-shadow: 0 0 20px var(--accent);
    }

    .topic-title {
      font-size: clamp(18px, 2vw, 24px);
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .topic-description {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      flex: 1;
      transition: color 0.5s;
    }

    .topic-arrow {
      margin-top: 14px;
      align-self: flex-end;
      color: var(--accent);
      font-size: 18px;
      font-weight: 500;
      opacity: 0.6;
      transition: transform 0.3s, opacity 0.3s, color 0.5s;
    }

    .topic-card:hover .topic-arrow {
      transform: translateX(6px);
      opacity: 1;
    }

    /* ============================================================
       СЕТКА КАРТОЧЕК
    ============================================================ */
    .topics-grid {
      max-width: 1100px;
      margin: 10px auto 0;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      position: relative;
      z-index: 2;
    }

    /* ============================================================
       ПЛАВАЮЩАЯ КНОПКА С ФИЗИКОЙ
    ============================================================ */
    .back-link {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 1000;
      padding: 10px 22px;
      border: 1px solid var(--border);
      border-radius: 40px;
      background: rgba(6, 10, 16, 0.7);
      backdrop-filter: blur(12px);
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: border-color 0.5s, color 0.5s, background 0.5s, box-shadow 0.5s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      letter-spacing: 0.3px;
      will-change: transform;
    }

    .back-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(34, 255, 136, 0.08);
      box-shadow: 0 6px 30px rgba(34, 255, 136, 0.15);
    }

    body.theme-orange .back-link:hover { background: rgba(255, 140, 66, 0.10); box-shadow: 0 6px 30px rgba(255, 140, 66, 0.15); }
    body.theme-purple .back-link:hover { background: rgba(170, 102, 255, 0.10); box-shadow: 0 6px 30px rgba(170, 102, 255, 0.15); }
    body.theme-blue .back-link:hover { background: rgba(74, 158, 255, 0.10); box-shadow: 0 6px 30px rgba(74, 158, 255, 0.15); }

    /* ============================================================
       АДАПТИВНОСТЬ
    ============================================================ */
    @media (max-width: 640px) {
      body { padding: 0 16px 30px; }
      header { margin: 0 -16px; padding-left: 16px; padding-right: 16px; }
      .brand p { font-size: 11px; }
      .page-title { margin-top: 20px; }
      .progress-bar { margin-top: 6px; height: 2px; }
      .topics-grid { grid-template-columns: 1fr; gap: 14px; }
      .topic-card { padding: 18px; }
      .topic-title { font-size: 20px; }
      .back-link {
        bottom: 16px;
        left: 16px;
        padding: 8px 18px;
        font-size: 13px;
        backdrop-filter: blur(10px);
      }
      .topic-card::before { display: none; }
    }

    @media (max-width: 400px) {
      .topic-card { padding: 16px; }
      .topic-title { font-size: 18px; }
      .back-link {
        bottom: 12px;
        left: 12px;
        padding: 6px 14px;
        font-size: 12px;
      }
    }

    @media (min-width: 641px) {
      .topic-card::before { display: block; }
    }
  </style>
</head>

<body>

  <!-- ============================================================
       ИДЕЯ 4: Дышащие фоновые символы
  ============================================================ -->
  <div class="bg-symbols" id="bgSymbols"></div>

  <!-- ============================================================
       HEADER + ИДЕЯ 1: ПРОГРЕСС-БАР (всегда виден)
  ============================================================ -->
  <header>
    <div class="header-row">
      <div class="brand">
        <h1>EPALLAXIS <span>math</span></h1>
        <p>Ἐπαλλάσσω — приводить систему в порядок</p>
      </div>
    </div>
    <div class="progress-bar" id="progressBar">
      <div class="fill" id="progressFill"></div>
    </div>
  </header>

  <!-- ============================================================
       ЗАГОЛОВОК СТРАНИЦЫ
  ============================================================ -->
  <div class="page-title">
    <h1>Алгебра <span>9 класс</span></h1>
    <p>Выберите тему, чтобы начать изучение</p>
  </div>

  <!-- ============================================================
       СЕТКА КАРТОЧЕК (ИДЕИ 2, 3, 5)
  ============================================================ -->
  <section class="topics-grid" id="topicsGrid"></section>

  <!-- ============================================================
       ПЛАВАЮЩАЯ КНОПКА С ФИЗИКОЙ
  ============================================================ -->
  <a href="../../index.html" class="back-link" id="backLink">← На главную</a>

  <script>
    // ================================================================
    // 1. ПРИМЕНЕНИЕ СОХРАНЁННОЙ ТЕМЫ
    // ================================================================
    (function applyTheme() {
      const theme = localStorage.getItem('epallaxis-theme') || 'green';
      if (theme !== 'green') {
        document.body.classList.add('theme-' + theme);
      }
    })();

    // ================================================================
    // 2. ИДЕЯ 4: ГЕНЕРАЦИЯ ДЫШАЩИХ ФОНОВЫХ СИМВОЛОВ
    // ================================================================
    (function createBgSymbols() {
      const container = document.getElementById('bgSymbols');
      if (!container) return;
      const symbols = ['∫', '∑', 'π', '√', '∞', '∂', '∇', 'Δ', 'θ', 'λ', 'σ', 'φ', 'ω', 'x²', '∠'];
      for (let i = 0; i < 12; i++) {
        const span = document.createElement('span');
        span.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        const size = 60 + Math.random() * 100;
        span.style.fontSize = size + 'px';
        span.style.left = Math.random() * 100 + '%';
        span.style.top = Math.random() * 100 + '%';
        span.style.animationDelay = (Math.random() * 10) + 's';
        span.style.opacity = 0.02 + Math.random() * 0.06;
        container.appendChild(span);
      }
    })();

    // ================================================================
    // 3. ИДЕЯ 1: ПРОГРЕСС-БАР В ШАПКЕ (всегда виден)
    // ================================================================
    (function setupProgressBar() {
      const fill = document.getElementById('progressFill');
      if (!fill) return;
      const updateProgress = () => {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
        fill.style.width = Math.min(100, progress) + '%';
      };
      window.addEventListener('scroll', updateProgress, { passive: true });
      window.addEventListener('resize', updateProgress, { passive: true });
      updateProgress();
    })();

    // ================================================================
    // 4. ИДЕЯ 2,3,5: ГЕНЕРАЦИЯ КАРТОЧЕК С ЗАДЕРЖКАМИ
    // ================================================================
    const topics = [
      { number: '01', title: 'Глава 1. Рациональные выражения', description: 'Рациональная дробь. Основное свойство РД, сокращение РД. Сложение, вычитание, умножение, деление РД.' },
      { number: '02', title: 'Неравенства', description: 'Линейные и квадратные неравенства. Метод интервалов. Системы неравенств.' },
      { number: '03', title: 'Системы уравнений', description: 'Решение систем двух уравнений с двумя неизвестными. Графический метод.' },
      { number: '04', title: 'Функции и графики', description: 'Квадратичная функция. Построение графиков. Свойства функций.' },
      { number: '05', title: 'Арифметическая прогрессия', description: 'Формула n-го члена. Сумма первых n членов. Применение.' },
      { number: '06', title: 'Геометрическая прогрессия', description: 'Знаменатель. Формула суммы. Бесконечно убывающая прогрессия.' },
      { number: '07', title: 'Элементы комбинаторики', description: 'Перестановки, размещения, сочетания. Основные формулы.' },
      { number: '08', title: 'Вероятность событий', description: 'Классическое определение вероятности. Сложение и умножение вероятностей.' },
      { number: '09', title: 'Тригонометрия (введение)', description: 'Синус, косинус, тангенс острого угла. Основные тригонометрические тождества.' },
      { number: '10', title: 'Текстовые задачи', description: 'Задачи на движение, работу, проценты. Составление уравнений.' },
    ];

    const grid = document.getElementById('topicsGrid');

    topics.forEach((topic, index) => {
      const card = document.createElement('div');
      card.className = 'topic-card';
      card.style.animationDelay = `${0.1 + index * 0.07}s`;

      card.innerHTML = `
        <div class="topic-number">${topic.number}</div>
        <div class="topic-title">${topic.title}</div>
        <div class="topic-description">${topic.description}</div>
        <div class="topic-arrow">→</div>
      `;

      card.addEventListener('click', () => {
        alert(`Тема "${topic.title}" в разработке. Скоро здесь появится теория и практика.`);
      });

      grid.appendChild(card);
    });

    // ================================================================
    // 5. ФИЗИКА КНОПКИ (сопротивление среде)
    // ================================================================
    const backLink = document.getElementById('backLink');

    const SPRING = 0.12;
    const DAMPING = 0.88;
    const MAX_OFFSET = 35;
    const SENSITIVITY = 0.06;

    let targetOffset = 0;
    let currentOffset = 0;
    let velocity = 0;
    let lastScrollY = window.scrollY;
    let animationId = null;

    function updatePhysics() {
      const force = (targetOffset - currentOffset) * SPRING;
      velocity += force;
      velocity *= DAMPING;
      currentOffset += velocity;

      if (Math.abs(currentOffset) > MAX_OFFSET) {
        currentOffset = Math.sign(currentOffset) * MAX_OFFSET;
        velocity *= 0.5;
      }

      const rotation = currentOffset * 0.15;
      const scale = 1 - Math.abs(currentOffset) * 0.003;
      backLink.style.transform = `translateY(${currentOffset}px) rotate(${rotation}deg) scale(${scale})`;

      if (Math.abs(velocity) > 0.01 || Math.abs(currentOffset - targetOffset) > 0.1) {
        animationId = requestAnimationFrame(updatePhysics);
      } else {
        currentOffset = targetOffset;
        backLink.style.transform = `translateY(${currentOffset}px) rotate(0deg) scale(1)`;
        animationId = null;
      }
    }

    let scrollTimeout = null;
    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      const delta = scrollY - lastScrollY;
      let newTarget = targetOffset - delta * SENSITIVITY;
      newTarget = Math.max(-MAX_OFFSET, Math.min(MAX_OFFSET, newTarget));
      targetOffset = newTarget;
      lastScrollY = scrollY;

      if (!animationId) {
        animationId = requestAnimationFrame(updatePhysics);
      }

      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        targetOffset = 0;
        if (!animationId) {
          animationId = requestAnimationFrame(updatePhysics);
        }
      }, 250);
    });
  </script>

</body>
</html>
